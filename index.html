function calcScore(emp,entries,bt,et){
  const sv=(entries.find(e=>e.eid===emp.id&&e.kid==="k1")||{}).v||0;
  const res=KPIS.map(k=>{
    const en=entries.find(e=>e.eid===emp.id&&e.kid===k.id);
    if(!en)return{k,v:null,t:null,s:null};
    let t=null;
    if(k.tl==="branch")t=(bt.find(x=>x.bid===emp.bid&&x.kid===k.id)||{}).v;
    else if(k.tl==="pharmacist")t=(et.find(x=>x.eid===emp.id&&x.kid===k.id)||{}).v;
    else if(k.tl==="fixed")t=k.ft;
    let s=0;
    if(k.st==="bin"){const p=sv>0?(en.v/sv)*100:100;s=p<=(k.bt||1.5)?k.w:0;}
    else if(t&&t>0){s=(en.v/t)*k.w;if(k.cap)s=Math.min(s,k.w);}
    return{k,v:en.v,t,s:Math.round(s*100)/100};
  });
  return{res,total:Math.round(res.reduce((a,r)=>a+(r.s||0),0)*100)/100};
}

function RP({role}){const c={admin:["#E8F8FC","#0077B6"],accountant:["#FEF3E8","#D46A1A"],manager:["#EDE9FE","#7C3AED"],pharmacist:["#F0FDF4","#16A34A"]};const[bg,fg]=c[role]||c.pharmacist;return<span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",padding:"2px 6px",borderRadius:4,background:bg,color:fg}}>{role}</span>}
function Th({children}){return<th style={{textAlign:"left",padding:"10px 16px",fontSize:10,color:"#9AABB8",textTransform:"uppercase",letterSpacing:.8,borderBottom:"1px solid #E4EBF0",fontWeight:600}}>{children}</th>}
function Td({children,b}){return<td style={{padding:"10px 16px",fontSize:13,fontWeight:b?600:400}}>{children}</td>}
function Card({label,value,accent,sub,sm}){return<div style={cardS}><div style={{...acS,background:accent}}/><div style={{fontSize:11,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:6,fontWeight:600}}>{label}</div><div style={{fontSize:sm?16:26,fontWeight:700,letterSpacing:sm?0:-1}}>{value}</div>{sub&&<div style={{fontSize:11,color:"#9AABB8",marginTop:4}}>{sub}</div>}</div>}

function Dashboard({user,emps,entries,bt,et,branches}){
  const isA=user.role==="admin";
  const ph=emps.filter(e=>e.role==="pharmacist"&&(isA||e.bid===user.bid));
  const sc=ph.map(p=>({e:p,...calcScore(p,entries,bt,et)}));
  const sorted=[...sc].sort((a,b)=>b.total-a.total);
  const avg=sc.length?Math.round(sc.reduce((s,x)=>s+x.total,0)/sc.length*10)/10:0;
  const top=sorted[0];
  const sales=entries.filter(e=>e.kid==="k1"&&(isA||emps.find(x=>x.id===e.eid)?.bid===user.bid)).reduce((s,e)=>s+e.v,0);
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:4}}>{isA?"Overview Dashboard":"Branch Dashboard"}</h1>
    <p style={{fontSize:13,color:"#6B7D8E",marginBottom:24}}>{MO}</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14,marginBottom:24}}>
      <Card label="Avg Score" value={avg+"%"} accent="#00B4D8"/>
      <Card label="Sales" value={(sales/1000).toFixed(0)+"K"} accent="#F58634" sub="SAR"/>
      <Card label="Active" value={ph.filter(p=>entries.some(e=>e.eid===p.id)).length+"/"+ph.length} accent="#22C55E"/>
      {top&&<Card label="Top" value={top.e.name} accent="#F59E0B" sub={top.total+"%"} sm/>}
    </div>
    <div style={wrapS}><div style={headS}><b>Scoreboard</b></div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
        <thead><tr><Th>Name</Th><Th>Branch</Th>{KPIS.map(k=><Th key={k.id}>{k.name} ({k.w}%)</Th>)}<Th>Total</Th></tr></thead>
        <tbody>{sorted.map(x=><tr key={x.e.id} style={{borderBottom:"1px solid #E4EBF0"}}>
          <Td b>{x.e.name}</Td><Td>{branches.find(b=>b.id===x.e.bid)?.name}</Td>
          {x.res.map((r,i)=><Td key={i}>{r.s!==null?<Pill type={r.s>=r.k.w?"success":r.s>=r.k.w*.7?"warn":"danger"}>{r.s}%</Pill>:<Pill>—</Pill>}</Td>)}
          <Td><Pill type={x.total>=80?"success":x.total>=60?"warn":"danger"}>{x.total}%</Pill></Td>
        </tr>)}</tbody>
      </table></div>
    </div>
    {isA&&<div style={wrapS}><div style={headS}><b>Branch Sales</b></div><div style={{padding:"16px 20px"}}>{branches.filter(b=>entries.some(e=>e.bid===b.id&&e.kid==="k1")).map(br=>{
      const s=entries.filter(e=>e.bid===br.id&&e.kid==="k1").reduce((a,e)=>a+e.v,0);
      const t=(bt.find(x=>x.bid===br.id&&x.kid==="k1")||{}).v||1;
      const p=Math.min((s/t)*100,120);
      return<div key={br.id} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><b>{br.name}</b><span style={{color:"#6B7D8E"}}>{(s/1000).toFixed(0)}K/{(t/1000).toFixed(0)}K</span></div>
        <div style={{height:6,background:"#E4EBF0",borderRadius:3,overflow:"hidden"}}><div style={{height:6,borderRadius:3,width:Math.min(p,100)+"%",background:p>=90?"#22C55E":p>=70?"#F58634":"#EF4444"}}/></div></div>
    })}</div></div>}
  </div>;
}

  const{res,total}=calcScore(user,entries,bt,et);
  const sc=total>=90?"#22C55E":total>=70?"#F58634":"#EF4444";
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:4}}>My Performance</h1>
    <p style={{fontSize:13,color:"#6B7D8E",marginBottom:24}}>{MO} — {branches.find(b=>b.id===user.bid)?.name}</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
      <Card label="Score" value={total+"%"} accent={sc}/><Card label="Met" value={res.filter(r=>r.s!==null&&r.s>=r.k.w).length+"/"+res.filter(r=>r.s!==null).length} accent="#00B4D8"/>
    </div>
    <div style={wrapS}><div style={headS}><b>Breakdown</b></div><div style={{padding:"16px 20px"}}>{res.map((r,i)=>{
      const pw=r.s!==null?Math.min((r.s/r.k.w)*100,150):0;
      const bc=r.s===null?"#E4EBF0":r.s>=r.k.w?"#22C55E":r.s>=r.k.w*.7?"#F58634":"#EF4444";
      return<div key={i} style={{marginBottom:16}}>

          <div><b style={{fontSize:13}}>{r.k.name}</b> <Pill type="cyan">{r.k.w}%</Pill></div>
          {r.s!==null?<Pill type={r.s>=r.k.w?"success":"warn"}>{r.s}%</Pill>:<Pill>—</Pill>}
        </div>
        <div style={{height:7,background:"#E4EBF0",borderRadius:4,overflow:"hidden"}}><div style={{height:7,borderRadius:4,width:Math.min(pw,100)+"%",background:bc}}/></div>

    })}</div>
    <div style={{padding:"12px 20px",borderTop:"1px solid #E4EBF0",display:"flex",justifyContent:"space-between"}}><b>Total</b><b style={{fontSize:18,color:sc}}>{total}%</b></div>

}

function EntryPage({user,emps,entries,setEntries,branches,bt,et}){
  const[se,setSe]=useState("");const[sm,setSm]=useState(MO);const[vals,setVals]=useState({});
  const ph=emps.filter(e=>e.role==="pharmacist");const em=ph.find(e=>e.id===se);

    if(LIVE){for(const en of n){await sbUpsert("kpi_entries",{employee_id:en.eid,kpi_id:en.kid,branch_id:en.bid,value:en.v,month:en.mo,entered_by:en.by},"employee_id,kpi_id,month");}}

  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:24}}>KPI Entry</h1>

        <div><label style={LS}>Month</label><input type="month" value={sm} onChange={e=>setSm(e.target.value)} style={IS}/></div>
      </div>
      {em&&KPIS.map(k=>{const ex=entries.find(e=>e.eid===se&&e.kid===k.id&&e.mo===sm);
        let tl="";if(k.tl==="branch"){const t=bt.find(x=>x.bid===em.bid&&x.kid===k.id);tl=t?"Target: "+t.v.toLocaleString():"No target";}
        else if(k.tl==="pharmacist"){const t=et.find(x=>x.eid===em.id&&x.kid===k.id);tl=t?"Target: "+t.v.toLocaleString():"No target";}
        else if(k.tl==="fixed")tl="Target: "+k.ft+"%";

          <input type="number" placeholder={ex?"Current: "+ex.v:"Enter..."} value={vals[k.id]||""} onChange={e=>setVals({...vals,[k.id]:e.target.value})} style={IS}/>
        </div>})}
      {em&&<button onClick={save} style={BS}>Save</button>}

  </div>;
}

  const blank={name:"",phone:"",email:"",role:"pharmacist",bid:BRANCHES[0].id};
  const[f,setF]=useState(blank);

  const openAdd=()=>{setF(blank);setEditId(null);setShow(true);};
  const openEdit=(e)=>{setF({name:e.name,phone:e.phone||"",email:e.email||"",role:e.role,bid:e.bid||""});setEditId(e.id);setShow(true);};

  const save=async()=>{
    if(!f.name)return;
    if(editId){
      setEmps(p=>p.map(x=>x.id===editId?{...x,...f}:x));
      if(LIVE)await sbUpdate("employees",editId,{name:f.name,phone:f.phone,email:f.email,role:f.role,branch_id:f.bid||null});
    }else{
      const newId="e"+Date.now();
      setEmps(p=>[...p,{id:newId,...f,active:true}]);
      if(LIVE){const r=await sbInsert("employees",{name:f.name,phone:f.phone,email:f.email,role:f.role,branch_id:f.bid||null,is_active:true});if(r)setEmps(p=>p.map(x=>x.id===newId?{...mapEmp(r)}:x));}
    }
    setF(blank);setEditId(null);setShow(false);
  };

  const confirmDel=async()=>{setEmps(p=>p.filter(x=>x.id!==delId));if(LIVE)await sbDelete("employees",delId);setDelId(null);};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><h1 style={{fontSize:26,fontWeight:500}}>Employees</h1><button onClick={openAdd} style={BS}>+ Add</button></div>
    <div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Name</Th><Th>Role</Th><Th>Branch</Th><Th>Phone</Th><Th>Email</Th><Th>Status</Th><Th>Actions</Th></tr></thead>
      <tbody>{emps.map(e=><tr key={e.id} style={{borderBottom:"1px solid #E4EBF0"}}>
        <Td b>{e.name}</Td>
        <Td><RP role={e.role}/></Td>
        <Td>{branches.find(b=>b.id===e.bid)?.name||"All"}</Td>
        <Td>{e.phone||"—"}</Td>
        <Td>{e.email||"—"}</Td>
        <Td><Pill type={e.active?"success":"danger"}>{e.active?"Active":"Off"}</Pill></Td>
        <Td>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button onClick={()=>openEdit(e)} style={{...BG,fontSize:11,padding:"4px 10px",color:"#0077B6",borderColor:"#00B4D8"}}>Edit</button>
            <button onClick={async()=>{setEmps(p=>p.map(x=>x.id===e.id?{...x,active:!x.active}:x));if(LIVE)await sbUpdate("employees",e.id,{is_active:!e.active});}} style={{...BG,fontSize:11,padding:"4px 10px"}}>{e.active?"Deactivate":"Activate"}</button>
            <button onClick={()=>setDelId(e.id)} style={{...BG,fontSize:11,padding:"4px 10px",color:"#EF4444",borderColor:"#FCA5A5"}}>Delete</button>
          </div>
        </Td>
      </tr>)}</tbody></table></div>

    <Modal open={show} onClose={()=>{setShow(false);setEditId(null);}} title={editId?"Edit Employee":"Add Employee"}>
      <div style={{marginBottom:14}}><label style={LS}>Full Name</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} style={IS} placeholder="Enter name..."/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={LS}>Phone</label><input value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} style={IS} placeholder="05xxxxxxxx"/></div>
        <div><label style={LS}>Email</label><input value={f.email} onChange={e=>setF({...f,email:e.target.value})} style={IS} placeholder="name@firstbrand.sa"/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={LS}>Role</label><select value={f.role} onChange={e=>setF({...f,role:e.target.value})} style={IS}><option value="pharmacist">Pharmacist</option><option value="manager">Manager</option><option value="accountant">Accountant</option><option value="admin">Admin</option></select></div>
        <div><label style={LS}>Branch</label><select value={f.bid} onChange={e=>setF({...f,bid:e.target.value})} style={IS}><option value="">None (Accountant)</option>{branches.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select></div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>{setShow(false);setEditId(null);}} style={BG}>Cancel</button><button onClick={save} style={BS}>{editId?"Save Changes":"Add Employee"}</button></div>
    </Modal>

    <Modal open={!!delId} onClose={()=>setDelId(null)} title="Delete Employee">
      <p style={{fontSize:14,color:"#6B7D8E",marginBottom:8}}>Are you sure you want to permanently delete <b>{emps.find(e=>e.id===delId)?.name}</b>?</p>
      <p style={{fontSize:12,color:"#EF4444",marginBottom:16}}>This action cannot be undone. All their KPI data will remain but won't be linked to this employee.</p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setDelId(null)} style={BG}>Cancel</button><button onClick={confirmDel} style={{...BS,background:"linear-gradient(135deg,#EF4444,#DC2626)"}}>Delete</button></div>
    </Modal>
  </div>;
}

function TasksPage({user,emps,tasks,setTasks}){
  const[show,setShow]=useState(false);const[showDone,setShowDone]=useState(false);
  const[f,setF]=useState({title:"",desc:"",tt:"all_branches",te:"",due:"",wa:false});
  const add=async()=>{if(!f.title)return;const t={id:"t"+Date.now(),by:user.id,...f,te:f.tt==="employee"?f.te:null,at2:f.tt==="employee"?f.te:null,done:false,db:null,cat:new Date().toISOString()};setTasks(p=>[t,...p]);
    if(LIVE)await sbInsert("tasks",{created_by:user.id,title:f.title,description:f.desc||null,target_type:f.tt,target_employee_id:f.tt==="employee"?f.te:null,assigned_to:f.tt==="employee"?f.te:null,due_date:f.due||null,notify_whatsapp:f.wa});
    setF({title:"",desc:"",tt:"all_branches",te:"",due:"",wa:false});setShow(false);};
  const tog=async(id)=>{const task=tasks.find(t=>t.id===id);setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done,db:t.done?null:user.id}:t));
    if(LIVE)await sbUpdate("tasks",id,{is_done:!task.done,done_by:task.done?null:user.id,done_at:task.done?null:new Date().toISOString()});};
  const my=tasks.filter(t=>user.role==="admin"||t.tt==="all_branches"||t.te===user.id||t.at2===user.id);
  const pending=[...my.filter(t=>!t.done)].sort((a,b)=>new Date(b.cat)-new Date(a.cat));
  const done=[...my.filter(t=>t.done)].sort((a,b)=>new Date(b.cat)-new Date(a.cat));
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><h1 style={{fontSize:26,fontWeight:500}}>Tasks</h1><p style={{fontSize:13,color:"#6B7D8E"}}>{pending.length} pending · {done.length} completed</p></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowDone(!showDone)} style={{...BG,background:showDone?"#E8F8FC":"transparent",color:showDone?"#0077B6":"#6B7D8E",borderColor:showDone?"#00B4D8":"#E4EBF0"}}>{showDone?"Hide":"Show"} completed ({done.length})</button>
        {user.role==="admin"&&<button onClick={()=>setShow(true)} style={BS}>+ Task</button>}
      </div>
    </div>
    {pending.length===0&&<p style={{color:"#9AABB8",textAlign:"center",padding:40}}>No pending tasks</p>}
    {pending.map(t=><div key={t.id} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",gap:12}}>
      <div onClick={()=>tog(t.id)} style={{width:22,height:22,borderRadius:6,border:"2px solid #D0DAE2",cursor:"pointer",flexShrink:0,marginTop:2}}/>
      <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{t.title}</div>{t.desc&&<div style={{fontSize:12,color:"#6B7D8E",marginTop:2}}>{t.desc}</div>}
        <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}><Pill type={t.tt==="all_branches"?"cyan":"orange"}>{t.tt==="all_branches"?"All branches":emps.find(e=>e.id===t.te)?.name}</Pill>{t.due&&<Pill type={new Date(t.due)<new Date()?"danger":"gray"}>{t.due}</Pill>}{t.wa&&<Pill type="success">WA</Pill>}</div></div>
      {user.role==="admin"&&<button onClick={async()=>{setTasks(p=>p.filter(x=>x.id!==t.id));if(LIVE)await sbDelete("tasks",t.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:16,padding:"4px",opacity:.4,flexShrink:0}} title="Delete">✕</button>}
    </div>)}
    {showDone&&done.length>0&&<>
      <div style={{fontSize:11,fontWeight:600,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,margin:"20px 0 10px"}}>Completed ({done.length})</div>
      {done.map(t=><div key={t.id} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",gap:12,opacity:.5}}>
        <div onClick={()=>tog(t.id)} style={{width:22,height:22,borderRadius:6,border:"2px solid #22C55E",background:"#22C55E",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>✓</div>
        <div><div style={{fontWeight:600,fontSize:14,textDecoration:"line-through"}}>{t.title}</div>
          <div style={{fontSize:11,color:"#9AABB8",marginTop:4}}>Done by {emps.find(e=>e.id===t.db)?.name}</div></div>
      </div>)}
    </>}
    <Modal open={show} onClose={()=>setShow(false)} title="New Task">
      <div style={{marginBottom:14}}><label style={LS}>Title</label><input value={f.title} onChange={e=>setF({...f,title:e.target.value})} style={IS}/></div>
      <div style={{marginBottom:14}}><label style={LS}>Description</label><textarea value={f.desc} onChange={e=>setF({...f,desc:e.target.value})} style={{...IS,minHeight:60}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={LS}>Assign</label><select value={f.tt} onChange={e=>setF({...f,tt:e.target.value})} style={IS}><option value="all_branches">All</option><option value="employee">Employee</option></select></div>
        {f.tt==="employee"&&<div><label style={LS}>Who</label><select value={f.te} onChange={e=>setF({...f,te:e.target.value})} style={IS}><option value="">Select...</option>{emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>}
      </div>
      <div style={{marginBottom:14}}><label style={LS}>Due</label><input type="date" value={f.due} onChange={e=>setF({...f,due:e.target.value})} style={IS}/></div>
      <label style={{fontSize:12}}><input type="checkbox" checked={f.wa} onChange={e=>setF({...f,wa:e.target.checked})}/> WhatsApp</label>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:18}}><button onClick={()=>setShow(false)} style={BG}>Cancel</button><button onClick={add} style={BS}>Create</button></div>
    </Modal>
  </div>;
}

function FilesPage({user,branches,files,setFiles,folders,setFolders}){
  const[showFolder,setShowFolder]=useState(false);const[showUpload,setShowUpload]=useState(false);
  const[nf,setNf]=useState("");const[curFolder,setCurFolder]=useState(null);
  const[uploading,setUploading]=useState(false);
  const[uf,setUf]=useState({desc:"",tt:"all",tid:""});
  const fileRef=React.useRef(null);
  const my=files.filter(f=>user.role==="admin"||f.tt==="all"||(f.tt==="branch"&&f.tid===user.bid));
  const myFolders=folders.filter(f=>f.parent===curFolder);
  const myFiles=my.filter(f=>f.fid===curFolder);
  const addFolder=async()=>{if(!nf)return;const fid="fl"+Date.now();setFolders(p=>[...p,{id:fid,name:nf,parent:curFolder}]);
    if(LIVE){const r=await sbInsert("folders",{name:nf,parent_id:curFolder||null});if(r)setFolders(p=>p.map(x=>x.id===fid?{id:r.id,name:r.name,parent:r.parent_id}:x));}
    setNf("");setShowFolder(false);};

  const uploadFile=async()=>{
    const fileInput=fileRef.current;
    if(!fileInput||!fileInput.files[0])return;
    setUploading(true);
    const file=fileInput.files[0];
    const fname=Date.now()+"_"+file.name;
    const ftype=file.type;
    const isPdf=ftype.includes("pdf");
    const isImg=ftype.includes("image");
    let fileUrl="";

    if(LIVE){
      const{data:upData,error:upErr}=await SB.storage.from("files").upload(fname,file);
      if(upErr){console.error("Upload error:",upErr);setUploading(false);return;}
      const{data:urlData}=SB.storage.from("files").getPublicUrl(fname);
      fileUrl=urlData?.publicUrl||"";
      const r=await sbInsert("files",{file_name:file.name,file_url:fileUrl,file_size:file.size,file_type:ftype,target_type:uf.tt,target_id:uf.tt!=="all"?uf.tid:null,description:uf.desc||null,folder_id:curFolder||null,uploaded_by:user.id});
      if(r)setFiles(p=>[...p,{id:r.id,name:r.file_name,type:isPdf?"pdf":isImg?"img":"other",tt:r.target_type,tid:r.target_id,desc:r.description,fid:r.folder_id,url:r.file_url,size:r.file_size}]);
    }else{
      setFiles(p=>[...p,{id:"f"+Date.now(),name:file.name,type:isPdf?"pdf":isImg?"img":"other",tt:uf.tt,tid:uf.tt!=="all"?uf.tid:null,desc:uf.desc,fid:curFolder,url:"",size:file.size}]);
    }
    setUploading(false);setShowUpload(false);setUf({desc:"",tt:"all",tid:""});
    if(fileRef.current)fileRef.current.value="";
  };

  const breadcrumb=[];
  let bc=curFolder;
  while(bc){const fl=folders.find(f=>f.id===bc);if(fl){breadcrumb.unshift(fl);bc=fl.parent;}else break;}

  const fmtSize=(s)=>{if(!s)return"";if(s<1024)return s+"B";if(s<1048576)return(s/1024).toFixed(1)+"KB";return(s/1048576).toFixed(1)+"MB";};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><h1 style={{fontSize:26,fontWeight:500}}>File Stash</h1>
        <div style={{display:"flex",gap:4,alignItems:"center",fontSize:13,color:"#6B7D8E",marginTop:4}}>
          <span onClick={()=>setCurFolder(null)} style={{cursor:"pointer",color:curFolder?"#00B4D8":"#1A2B3C",fontWeight:curFolder?500:600}}>All Files</span>
          {breadcrumb.map(f=><span key={f.id} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{color:"#D0DAE2"}}>/</span>
            <span onClick={()=>setCurFolder(f.id)} style={{cursor:"pointer",color:f.id===curFolder?"#1A2B3C":"#00B4D8",fontWeight:f.id===curFolder?600:500}}>{f.name}</span>
          </span>)}
        </div>
      </div>
      {user.role==="admin"&&<div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowFolder(true)} style={BG}>+ Folder</button>
        <button onClick={()=>setShowUpload(true)} style={BS}>+ Upload</button>
      </div>}
    </div>

    {myFolders.length>0&&<div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Folders</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
        {myFolders.map(f=><div key={f.id} onClick={()=>setCurFolder(f.id)} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#E8F8FC,#FEF3E8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📁</div>
          <div><div style={{fontWeight:600,fontSize:13}}>{f.name}</div>
            <div style={{fontSize:11,color:"#9AABB8"}}>{files.filter(x=>x.fid===f.id).length} files</div></div>
        </div>)}
      </div>
    </div>}

    {myFiles.length>0&&<div>
      <div style={{fontSize:11,fontWeight:600,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Files</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>

    if(LIVE){const r=await sbInsert("branches",{name:nb});if(r)setBranches(p=>p.map(x=>x.id===bid?{id:r.id,name:r.name}:x));}
    setNb("");setShowAdd(false);};

    if(LIVE)await sbUpsert("branch_targets",{branch_id:bid,kpi_id:kid,target_value:Number(v),month:tm},"branch_id,kpi_id,month");};
  const uET=async(eid,kid,v)=>{setEt(p=>{const i=p.findIndex(t=>t.eid===eid&&t.kid===kid&&t.mo===tm);if(i>=0){const n=[...p];n[i]={...n[i],v:Number(v)};return n;}return[...p,{eid,kid,v:Number(v),mo:tm}];});
    if(LIVE)await sbUpsert("employee_targets",{employee_id:eid,kpi_id:kid,target_value:Number(v),month:tm},"employee_id,kpi_id,month");};

function LoginPage({onLogin,onSetup,live}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[pw2,setPw2]=useState("");
  const[err,setErr]=useState("");const[ok,setOk]=useState("");const[loading,setLoading]=useState(false);

  const go=async()=>{setLoading(true);setErr("");const e=await onLogin(email,pw);if(e)setErr(e);setLoading(false);};

  const setup=async()=>{
    if(!email||!pw){setErr("Enter email and password");return;}
    if(pw.length<6){setErr("Password must be at least 6 characters");return;}
    if(pw!==pw2){setErr("Passwords don't match");return;}
    setLoading(true);setErr("");
    if(!LIVE){setErr("Setup only works in live mode");setLoading(false);return;}
    // Check employee exists
    const{data:emp}=await SB.from("employees").select("id,auth_id").eq("email",email).single();
    if(!emp){setErr("Email not found. Ask your admin to add you first.");setLoading(false);return;}
    if(emp.auth_id){setErr("Account already set up. Use Sign In instead.");setLoading(false);return;}
    // Create auth account
    const{data:authData,error:authErr}=await SB.auth.signUp({email,password:pw});
    if(authErr){setErr(authErr.message);setLoading(false);return;}
    // Link auth_id to employee — use service approach via RPC or direct
    // Since anon key can't update employees (admin only RLS), we use a workaround:
    // The admin pre-allows this via a special function
    const{error:linkErr}=await SB.rpc("link_auth_to_employee",{emp_id:emp.id,auth_uid:authData.user.id});
    if(linkErr){
      // Fallback: try direct update (works if RLS allows)
      await SB.from("employees").update({auth_id:authData.user.id}).eq("id",emp.id);
    }
    setOk("Account created! You can now sign in.");
    setMode("login");setPw("");setPw2("");setLoading(false);
  };

  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#F0FBFE,#FEF3E8)"}}>
    <div style={{width:380,maxWidth:"92vw"}}><div style={{textAlign:"center",marginBottom:28}}>

      <h1 style={{fontSize:22,color:"#0077B6"}}>First Brand Pharmacy</h1>
      <p style={{fontSize:11,color:live?"#22C55E":"#F58634",marginTop:6,fontWeight:600}}>{live?"● Live Mode":"● Demo Mode"}</p></div>
      <div style={{background:"#fff",borderRadius:16,padding:24,boxShadow:"0 8px 24px rgba(0,0,0,.06)"}}>

        {mode==="login"&&<>
          <div style={{marginBottom:14}}><label style={LS}>Email</label><input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");setOk("");}} onKeyDown={e=>e.key==="Enter"&&go()} style={{...IS,padding:12}} placeholder="name@firstbrand.sa"/></div>
          <div style={{marginBottom:14}}><label style={LS}>Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={{...IS,padding:12}} placeholder="••••••••"/></div>
          {ok&&<div style={{fontSize:12,color:"#22C55E",marginBottom:12,padding:8,background:"#F0FDF4",borderRadius:8}}>{ok}</div>}
          {err&&<div style={{fontSize:12,color:"#EF4444",marginBottom:12,padding:8,background:"#FEF2F2",borderRadius:8}}>{err}</div>}
          <button onClick={go} disabled={loading} style={{...BS,width:"100%",padding:12,fontSize:14,justifyContent:"center",opacity:loading?.6:1}}>{loading?"Signing in...":"Sign In"}</button>
          {live&&<p onClick={()=>{setMode("setup");setErr("");setOk("");}} style={{marginTop:16,fontSize:13,color:"#00B4D8",textAlign:"center",cursor:"pointer",fontWeight:600}}>First time? Set your password</p>}
          {!live&&<p style={{marginTop:14,fontSize:10,color:"#9AABB8",textAlign:"center"}}>Demo: moamen@ · sara@ · khalid@ · ahmed@ @firstbrand.sa (any password)</p>}
        </>}

        {mode==="setup"&&<>
          <div style={{marginBottom:16}}><h3 style={{fontSize:16,fontWeight:600,marginBottom:4}}>Set up your account</h3><p style={{fontSize:12,color:"#6B7D8E"}}>Enter the email your admin registered for you</p></div>
          <div style={{marginBottom:14}}><label style={LS}>Your email</label><input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} style={{...IS,padding:12}} placeholder="name@firstbrand.sa"/></div>
          <div style={{marginBottom:14}}><label style={LS}>Choose password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={{...IS,padding:12}} placeholder="Min 6 characters"/></div>
          <div style={{marginBottom:14}}><label style={LS}>Confirm password</label><input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setup()} style={{...IS,padding:12}} placeholder="Type password again"/></div>
          {err&&<div style={{fontSize:12,color:"#EF4444",marginBottom:12,padding:8,background:"#FEF2F2",borderRadius:8}}>{err}</div>}
          <button onClick={setup} disabled={loading} style={{...BS,width:"100%",padding:12,fontSize:14,justifyContent:"center",opacity:loading?.6:1}}>{loading?"Creating account...":"Create Account"}</button>
          <p onClick={()=>{setMode("login");setErr("");}} style={{marginTop:16,fontSize:13,color:"#00B4D8",textAlign:"center",cursor:"pointer",fontWeight:600}}>Back to Sign In</p>
        </>}

      </div>
    </div>
  </div>;
}

// DATABASE LAYER — Supabase when LIVE, localStorage fallback
// ═══════════════════════════════════════════
function loadState(key,fb){try{const v=localStorage.getItem("fb_"+key);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function saveState(key,v){try{localStorage.setItem("fb_"+key,JSON.stringify(v));}catch(e){}}

// Supabase helpers
async function sbLoad(table,filter){
  if(!SB)return null;
  let q=SB.from(table).select("*");
  if(filter)q=filter(q);
  const{data,error}=await q;
  if(error){console.error("sbLoad",table,error);return null;}
  return data;
}
async function sbInsert(table,row){if(!SB)return null;const{data,error}=await SB.from(table).insert(row).select();if(error)console.error("sbInsert",error);return data?.[0];}
async function sbUpdate(table,id,vals){if(!SB)return;const{error}=await SB.from(table).update(vals).eq("id",id);if(error)console.error("sbUpdate",error);}
async function sbDelete(table,id){if(!SB)return;const{error}=await SB.from(table).delete().eq("id",id);if(error)console.error("sbDelete",error);}
async function sbUpsert(table,row,conflict){if(!SB)return null;const{data,error}=await SB.from(table).upsert(row,{onConflict:conflict}).select();if(error)console.error("sbUpsert",error);return data?.[0];}

// Map Supabase data to app format
function mapEmp(e){return{id:e.id,name:e.name,role:e.role,bid:e.branch_id,phone:e.phone,email:e.email,active:e.is_active};}
function mapEntry(e){return{eid:e.employee_id,kid:e.kpi_id,bid:e.branch_id,v:e.value,mo:e.month,by:e.entered_by};}
function mapBT(t){return{bid:t.branch_id,kid:t.kpi_id,v:t.target_value,mo:t.month};}
function mapET(t){return{eid:t.employee_id,kid:t.kpi_id,v:t.target_value,mo:t.month};}
function mapAnn(a){return{id:a.id,sid:a.sender_id,title:a.title,body:a.body,tt:a.target_type,pri:a.priority,wa:a.notify_whatsapp,at:a.created_at};}
function mapTask(t){return{id:t.id,by:t.created_by,title:t.title,desc:t.description,tt:t.target_type,te:t.target_employee_id,at2:t.assigned_to,due:t.due_date,done:t.is_done,db:t.done_by,wa:t.notify_whatsapp,cat:t.created_at};}
function mapDm(d){return{id:d.id,sid:d.sender_id,rid:d.receiver_id,body:d.body,read:d.is_read,at:d.created_at};}

  const[mobMenu,setMobMenu]=useState(false);
  const[showPwChange,setShowPwChange]=useState(false);
  const[newPw,setNewPw]=useState("");const[newPw2,setNewPw2]=useState("");const[pwMsg,setPwMsg]=useState("");const[pwErr,setPwErr]=useState("");
  const changePw=async()=>{
    if(newPw.length<6){setPwErr("Min 6 characters");return;}
    if(newPw!==newPw2){setPwErr("Passwords don't match");return;}
    setPwErr("");
    if(LIVE){const{error}=await SB.auth.updateUser({password:newPw});if(error){setPwErr(error.message);return;}}
    setPwMsg("Password changed!");setNewPw("");setNewPw2("");
    setTimeout(()=>{setShowPwChange(false);setPwMsg("");},1500);
  };

  // ── Supabase: check session + load data ──
  React.useEffect(()=>{
    if(!LIVE)return;
    (async()=>{
      // Check existing session
      const{data:{session}}=await SB.auth.getSession();
      if(session){
        // Load employee profile
        const{data:emp}=await SB.from("employees").select("*").eq("auth_id",session.user.id).single();
        if(emp){
          setUser(mapEmp(emp));
          setLoggedIn(true);
          // Load all data
          const[brData,empData,kpiData,enData,btData,etData,annData,taskData,dmData,apData]=await Promise.all([
            sbLoad("branches"),
            sbLoad("employees"),
            sbLoad("kpi_entries"),
            sbLoad("branch_targets"),
            sbLoad("employee_targets"),
            sbLoad("announcements"),
            sbLoad("tasks"),
            sbLoad("direct_messages"),
            sbLoad("accountant_permissions"),
            sbLoad("kpi_definitions")
          ]);
          const[fileData,folderData]=await Promise.all([sbLoad("files"),sbLoad("folders")]);
          if(brData)setBranches(brData.map(b=>({id:b.id,name:b.name})));
          if(empData)setEmps(empData.map(mapEmp));
          if(enData)setEntries(enData.map(mapEntry));
          if(btData)setBt(btData.map(mapBT));
          if(etData)setEt(etData.map(mapET));
          if(annData)setAnns(annData.map(mapAnn));
          if(taskData)setTasks(taskData.map(mapTask));
          if(dmData)setDms(dmData.map(mapDm));
          if(apData)setAp(apData.map(a=>({id:a.id,eid:a.employee_id,kid:a.kpi_id})));
          if(fileData)setFiles(fileData.map(f=>({id:f.id,name:f.file_name,type:f.file_type?.includes("pdf")?"pdf":f.file_type?.includes("image")?"img":"other",tt:f.target_type,tid:f.target_id,desc:f.description,fid:f.folder_id,url:f.file_url,size:f.file_size})));
          if(folderData)setFolders(folderData.map(f=>({id:f.id,name:f.name,parent:f.parent_id})));
          if(kpiData)setKpis(kpiData.sort((a,b)=>a.sort_order-b.sort_order).map(k=>({
            id:k.id,name:k.name,code:k.code,inp:k.input_type==="percent"?"pct":k.input_type,
            w:Number(k.weight),tl:k.target_level,st:k.scoring_type==="binary"?"bin":"prop",
            cap:k.is_capped,ft:k.fixed_target,bt:k.binary_threshold
          })));
          setPage(emp.role==="admin"?"dashboard":emp.role==="accountant"?"entry":"msgs");
        }
      }
      setLoading(false);
    })();

    // Realtime subscriptions
    const ch=SB.channel("realtime-all")
      .on("postgres_changes",{event:"*",schema:"public",table:"kpi_entries"},()=>{
        sbLoad("kpi_entries").then(d=>{if(d)setEntries(d.map(mapEntry));});
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"announcements"},()=>{
        sbLoad("announcements").then(d=>{if(d)setAnns(d.map(mapAnn));});
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"direct_messages"},()=>{
        sbLoad("direct_messages").then(d=>{if(d)setDms(d.map(mapDm));});
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>{
        sbLoad("tasks").then(d=>{if(d)setTasks(d.map(mapTask));});
      })
      .subscribe();
    return()=>{SB.removeChannel(ch);};
  },[]);

  // ── localStorage auto-save (demo mode only) ──
  React.useEffect(()=>{if(!LIVE)saveState("loggedIn",loggedIn)},[loggedIn]);
  React.useEffect(()=>{saveState("page",page)},[page]);
  React.useEffect(()=>{if(!LIVE)saveState("user",user)},[user]);
  React.useEffect(()=>{if(!LIVE)saveState("emps",emps)},[emps]);
  React.useEffect(()=>{if(!LIVE)saveState("kpis",kpis)},[kpis]);
  React.useEffect(()=>{if(!LIVE)saveState("entries",entries)},[entries]);
  React.useEffect(()=>{if(!LIVE)saveState("anns",anns)},[anns]);
  React.useEffect(()=>{if(!LIVE)saveState("dms",dms)},[dms]);
  React.useEffect(()=>{if(!LIVE)saveState("tasks",tasks)},[tasks]);
  React.useEffect(()=>{if(!LIVE)saveState("branches",branches)},[branches]);
  React.useEffect(()=>{if(!LIVE)saveState("bt",bt)},[bt]);
  React.useEffect(()=>{if(!LIVE)saveState("et",et)},[et]);
  React.useEffect(()=>{if(!LIVE)saveState("ap",ap)},[ap]);
  React.useEffect(()=>{if(!LIVE)saveState("files",files)},[files]);
  React.useEffect(()=>{if(!LIVE)saveState("folders",folders)},[folders]);

  // ── Loading screen ──
  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F7F9FC"}}>
    <div style={{textAlign:"center"}}>
      <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#00B4D8,#0077B6)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><span style={{color:"#fff",fontSize:22,fontWeight:700}}>F</span></div>
      <p style={{color:"#6B7D8E",fontSize:14}}>Connecting to database...</p>
    </div>
  </div>;

  const defPage=(role)=>role==="admin"?"dashboard":role==="accountant"?"entry":"msgs";

  // ── Login handler ──
  const handleLogin=async(email,password)=>{
    if(LIVE){
      const{data,error}=await SB.auth.signInWithPassword({email,password});
      if(error)return error.message;
      const{data:emp}=await SB.from("employees").select("*").eq("auth_id",data.user.id).single();
      if(!emp)return"No employee profile linked to this account";
      setUser(mapEmp(emp));
      setLoggedIn(true);
      // Reload all data
      const[brD,empD,enD,btD,etD,annD,taskD,dmD,apD]=await Promise.all([
        sbLoad("branches"),sbLoad("employees"),sbLoad("kpi_entries"),sbLoad("branch_targets"),
        sbLoad("employee_targets"),sbLoad("announcements"),sbLoad("tasks"),sbLoad("direct_messages"),sbLoad("accountant_permissions")
      ]);
      const[fileD,folderD]=await Promise.all([sbLoad("files"),sbLoad("folders")]);
      if(brD)setBranches(brD.map(b=>({id:b.id,name:b.name})));
      if(empD)setEmps(empD.map(mapEmp));
      if(enD)setEntries(enD.map(mapEntry));
      if(btD)setBt(btD.map(mapBT));
      if(etD)setEt(etD.map(mapET));
      if(annD)setAnns(annD.map(mapAnn));
      if(taskD)setTasks(taskD.map(mapTask));
      if(dmD)setDms(dmD.map(mapDm));
      if(apD)setAp(apD.map(a=>({id:a.id,eid:a.employee_id,kid:a.kpi_id})));
      if(fileD)setFiles(fileD.map(f=>({id:f.id,name:f.file_name,type:f.file_type?.includes("pdf")?"pdf":f.file_type?.includes("image")?"img":"other",tt:f.target_type,tid:f.target_id,desc:f.description,fid:f.folder_id,url:f.file_url,size:f.file_size})));
      if(folderD)setFolders(folderD.map(f=>({id:f.id,name:f.name,parent:f.parent_id})));
      setPage(defPage(emp.role));
      return null;
    } else {
      const emp=emps.find(x=>x.email===email);
      if(!emp)return"Not found. Try moamen@firstbrand.sa";
      setUser(emp);setLoggedIn(true);setPage(defPage(emp.role));
      return null;
    }
  };

  const handleLogout=async()=>{
    if(LIVE)await SB.auth.signOut();
    setLoggedIn(false);setMobMenu(false);
  };

  if(!loggedIn)return<LoginPage onLogin={handleLogin} live={LIVE}/>;

  const r=user.role;
  const nav=[
    {id:"msgs",l:"Messages",show:r!=="accountant",badge:dms.filter(d=>d.rid===user.id&&!d.read).length},
    {id:"dashboard",l:"Dashboard",show:r!=="accountant"},
    {id:"entry",l:"KPI Entry",show:r==="admin"||r==="accountant"},
    {id:"mylog",l:"My Entries",show:r==="accountant"},
    {id:"emps",l:"Employees",show:r==="admin"},
    {id:"tasks",l:"Tasks",show:r!=="accountant",badge:tasks.filter(t=>!t.done).length},
    {id:"files",l:"Files",show:r!=="accountant"},
    {id:"settings",l:"Settings",show:r==="admin"}
  ];

  const resetData=()=>{if(confirm("Reset all data to demo defaults?")){
    ["loggedIn","page","user","emps","kpis","entries","anns","dms","tasks","branches","bt","et","ap","files","folders"].forEach(k=>localStorage.removeItem("fb_"+k));
    location.reload();
  }};

  const sidebarContent=<>
    <div style={{padding:"20px 16px",borderBottom:"1px solid #E4EBF0",display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:"#fff",fontSize:18,fontWeight:700}}>F</span></div>
      <div><div style={{fontSize:15,fontWeight:600,color:"#0077B6"}}>First Brand</div><div style={{fontSize:9,color:"#F58634",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>Pharmacy</div></div>
    </div>
    <div style={{flex:1,padding:10,display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
      <div style={{fontSize:10,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1.5,padding:"10px 10px 4px",fontWeight:600}}>Menu</div>
      {nav.filter(n=>n.show).map(n=><div key={n.id} onClick={()=>{setPage(n.id);setMobMenu(false);}} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:500,color:page===n.id?"#fff":"#6B7D8E",background:page===n.id?"linear-gradient(135deg,#00B4D8,#0077B6)":"transparent",display:"flex",alignItems:"center",gap:8}}>
        {n.l}{n.badge>0&&<span style={{marginLeft:"auto",minWidth:16,height:16,borderRadius:8,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",background:page===n.id?"rgba(255,255,255,.3)":"#EF4444",color:"#fff"}}>{n.badge}</span>}
      </div>)}
      <div style={{flex:1}}/>
      <div style={{padding:"6px 12px",fontSize:10,color:LIVE?"#22C55E":"#F58634"}}>{LIVE?"● Connected to Supabase":"● Demo mode (localStorage)"}</div>
      {LIVE&&<div onClick={()=>setShowPwChange(true)} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:12,color:"#6B7D8E"}}>Change Password</div>}
      {!LIVE&&r==="admin"&&<div onClick={resetData} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:12,color:"#9AABB8"}}>Reset Demo Data</div>}
      <div onClick={handleLogout} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"#EF4444"}}>Sign Out</div>
    </div>
    {!LIVE&&<div style={{padding:"8px 10px",borderTop:"1px solid #E4EBF0"}}>
      <div style={{fontSize:9,color:"#9AABB8",marginBottom:3,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Demo</div>
      <select value={user.id} onChange={e=>{const u=emps.find(x=>x.id===e.target.value);setUser(u);setPage(defPage(u.role));setMobMenu(false);}} style={{...IS,fontSize:11,padding:"5px 8px"}}>{emps.map(e=><option key={e.id} value={e.id}>{e.name} ({e.role})</option>)}</select>
    </div>}
    <div style={{padding:14,borderTop:"1px solid #E4EBF0",display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:32,height:32,borderRadius:8,background:r==="accountant"?"linear-gradient(135deg,#F58634,#D46A1A)":"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff"}}>{user.name[0]}</div>
      <div><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><RP role={r}/></div>
    </div>
  </>;

  const mainContent=<>
    {page==="dashboard"&&r==="pharmacist"&&<PharmDash user={user} entries={entries} bt={bt} et={et} branches={branches}/>}
    {page==="dashboard"&&(r==="admin"||r==="manager")&&<Dashboard user={user} emps={emps} entries={entries} bt={bt} et={et} branches={branches}/>}
    {page==="entry"&&<EntryPage user={user} emps={emps} entries={entries} setEntries={setEntries} branches={branches} bt={bt} et={et}/>}
    {page==="mylog"&&<AcctLog user={user} entries={entries} emps={emps} branches={branches}/>}
    {page==="emps"&&<EmpsPage emps={emps} setEmps={setEmps} branches={branches}/>}
    {page==="tasks"&&<TasksPage user={user} emps={emps} tasks={tasks} setTasks={setTasks}/>}
    {page==="msgs"&&<MsgsPage user={user} emps={emps} anns={anns} setAnns={setAnns} dms={dms} setDms={setDms}/>}
    {page==="files"&&<FilesPage user={user} branches={branches} files={files} setFiles={setFiles} folders={folders} setFolders={setFolders}/>}
    {page==="settings"&&<SettingsPage emps={emps} branches={branches} setBranches={setBranches} bt={bt} setBt={setBt} et={et} setEt={setEt} ap={ap} setAp={setAp} kpis={kpis} setKpis={setKpis}/>}
  </>;

  return<div style={{display:"flex",minHeight:"100vh"}}>
    <div className="mobile-header" style={{display:"none",position:"fixed",top:0,left:0,right:0,height:56,background:"#fff",borderBottom:"1px solid #E4EBF0",zIndex:90,alignItems:"center",padding:"0 16px",gap:12}}>
      <div onClick={()=>setMobMenu(!mobMenu)} style={{width:36,height:36,borderRadius:8,background:"#F7F9FC",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18}}>☰</div>
      <div style={{fontSize:15,fontWeight:600,color:"#0077B6",flex:1}}>First Brand</div>
      <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{user.name[0]}</div>
    </div>
    {mobMenu&&<div className="mobile-overlay" onClick={()=>setMobMenu(false)} style={{display:"none",position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:95}}/>}
    {mobMenu&&<div className="sidebar-mobile" style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#fff",zIndex:100,display:"flex",flexDirection:"column",boxShadow:"4px 0 20px rgba(0,0,0,.1)"}}>{sidebarContent}</div>}
    <div className="sidebar-desktop" style={{width:240,minWidth:240,background:"#fff",borderRight:"1px solid #E4EBF0",display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh"}}>{sidebarContent}</div>
    <div className="main-content" style={{flex:1,padding:"24px 28px",overflowY:"auto"}}><div className="mobile-header" style={{display:"none",height:56}}/>{mainContent}</div>
    <Modal open={showPwChange} onClose={()=>{setShowPwChange(false);setPwErr("");setPwMsg("");setNewPw("");setNewPw2("");}} title="Change Password">
      <div style={{marginBottom:14}}><label style={LS}>New password</label><input type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setPwErr("");}} style={{...IS,padding:12}} placeholder="Min 6 characters"/></div>
      <div style={{marginBottom:14}}><label style={LS}>Confirm new password</label><input type="password" value={newPw2} onChange={e=>{setNewPw2(e.target.value);setPwErr("");}} onKeyDown={e=>e.key==="Enter"&&changePw()} style={{...IS,padding:12}} placeholder="Type again"/></div>
      {pwErr&&<div style={{fontSize:12,color:"#EF4444",marginBottom:12,padding:8,background:"#FEF2F2",borderRadius:8}}>{pwErr}</div>}
      {pwMsg&&<div style={{fontSize:12,color:"#22C55E",marginBottom:12,padding:8,background:"#F0FDF4",borderRadius:8}}>{pwMsg}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setShowPwChange(false)} style={BG}>Cancel</button><button onClick={changePw} style={BS}>Change Password</button></div>
    </Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
