function calcScore(emp,entries,bt,et){
  const sv=(entries.find(e=>e.eid===emp.id&&e.kid==="k1")||{}).v||0;
  const res=KPIS.map(k=>{
    const en=entries.find(e=>e.eid===emp.id&&e.kid===k.id);
    if(!en)return{k,v:null,t:null,s:null};
    let t=null;
    if(k.tl==="branch")t=(bt.find(x=>x.bid===emp.bid&&x.kid===k.id)||{}).v;
    else if(k.tl==="pharmacist")t=(et.find(x=>x.eid===emp.id&&x.kid===k.id)||{}).v;
    else if(k.tl==="fixed")t=k.ft;
    let s=0;
    if(k.st==="bin"){const p=sv>0?(en.v/sv)*100:100;s=p<=(k.bt||1.5)?k.w:0;}
    else if(t&&t>0){s=(en.v/t)*k.w;if(k.cap)s=Math.min(s,k.w);}
    return{k,v:en.v,t,s:Math.round(s*100)/100};
  });
  return{res,total:Math.round(res.reduce((a,r)=>a+(r.s||0),0)*100)/100};
}

const tAgo=d=>{const m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<60)return m+"m";const h=Math.floor(m/60);return h<24?h+"h":Math.floor(h/24)+"d";};

const IS={background:"#F7F9FC",border:"1px solid #E4EBF0",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#1A2B3C",width:"100%",outline:"none",fontFamily:"inherit",boxSizing:"border-box"};
const BS={padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",background:"linear-gradient(135deg,#00B4D8,#0077B6)",color:"#fff",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:6};
const BG={padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",background:"transparent",color:"#6B7D8E",border:"1px solid #E4EBF0",fontFamily:"inherit"};
const LS={fontSize:11,color:"#6B7D8E",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:5,fontWeight:600};
const TS={padding:"7px 14px",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer",border:"none",fontFamily:"inherit"};
const cardS={background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"18px 20px",position:"relative",overflow:"hidden"};
const acS={position:"absolute",top:0,left:0,right:0,height:3};
const wrapS={background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,overflow:"hidden",marginBottom:20};
const headS={padding:"14px 20px",borderBottom:"1px solid #E4EBF0",display:"flex",justifyContent:"space-between",alignItems:"center"};

function Pill({type,children}){const c={success:"#F0FDF4,#16A34A",danger:"#FEF2F2,#EF4444",warn:"#FFFBEB,#D97706",cyan:"#E8F8FC,#0077B6",orange:"#FEF3E8,#D46A1A",gray:"#F1F5F9,#6B7D8E"};const[bg,fg]=(c[type]||c.gray).split(",");return<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:bg,color:fg}}>{children}</span>}
function Modal({open,onClose,title,children}){if(!open)return null;return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}><div style={{background:"#fff",borderRadius:16,padding:28,width:480,maxWidth:"92vw",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}><h2 style={{fontSize:18,fontWeight:600,marginBottom:18}}>{title}</h2>{children}</div></div>}
function RP({role}){const c={admin:["#E8F8FC","#0077B6"],accountant:["#FEF3E8","#D46A1A"],manager:["#EDE9FE","#7C3AED"],pharmacist:["#F0FDF4","#16A34A"]};const[bg,fg]=c[role]||c.pharmacist;return<span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",padding:"2px 6px",borderRadius:4,background:bg,color:fg}}>{role}</span>}
function Th({children}){return<th style={{textAlign:"left",padding:"10px 16px",fontSize:10,color:"#9AABB8",textTransform:"uppercase",letterSpacing:.8,borderBottom:"1px solid #E4EBF0",fontWeight:600}}>{children}</th>}
function Td({children,b}){return<td style={{padding:"10px 16px",fontSize:13,fontWeight:b?600:400}}>{children}</td>}
function Card({label,value,accent,sub,sm}){return<div style={cardS}><div style={{...acS,background:accent}}/><div style={{fontSize:11,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:6,fontWeight:600}}>{label}</div><div style={{fontSize:sm?16:26,fontWeight:700,letterSpacing:sm?0:-1}}>{value}</div>{sub&&<div style={{fontSize:11,color:"#9AABB8",marginTop:4}}>{sub}</div>}</div>}

function Dashboard({user,emps,entries,bt,et,branches}){
  const isA=user.role==="admin";
  const ph=emps.filter(e=>e.role==="pharmacist"&&(isA||e.bid===user.bid));
  const sc=ph.map(p=>({e:p,...calcScore(p,entries,bt,et)}));
  const sorted=[...sc].sort((a,b)=>b.total-a.total);
  const avg=sc.length?Math.round(sc.reduce((s,x)=>s+x.total,0)/sc.length*10)/10:0;
  const top=sorted[0];
  const sales=entries.filter(e=>e.kid==="k1"&&(isA||emps.find(x=>x.id===e.eid)?.bid===user.bid)).reduce((s,e)=>s+e.v,0);
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:4}}>{isA?"Overview Dashboard":"Branch Dashboard"}</h1>
    <p style={{fontSize:13,color:"#6B7D8E",marginBottom:24}}>{MO}</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14,marginBottom:24}}>
      <Card label="Avg Score" value={avg+"%"} accent="#00B4D8"/>
      <Card label="Sales" value={(sales/1000).toFixed(0)+"K"} accent="#F58634" sub="SAR"/>
      <Card label="Active" value={ph.filter(p=>entries.some(e=>e.eid===p.id)).length+"/"+ph.length} accent="#22C55E"/>
      {top&&<Card label="Top" value={top.e.name} accent="#F59E0B" sub={top.total+"%"} sm/>}
    </div>
    <div style={wrapS}><div style={headS}><b>Scoreboard</b></div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
        <thead><tr><Th>Name</Th><Th>Branch</Th>{KPIS.map(k=><Th key={k.id}>{k.name} ({k.w}%)</Th>)}<Th>Total</Th></tr></thead>
        <tbody>{sorted.map(x=><tr key={x.e.id} style={{borderBottom:"1px solid #E4EBF0"}}>
          <Td b>{x.e.name}</Td><Td>{branches.find(b=>b.id===x.e.bid)?.name}</Td>
          {x.res.map((r,i)=><Td key={i}>{r.s!==null?<Pill type={r.s>=r.k.w?"success":r.s>=r.k.w*.7?"warn":"danger"}>{r.s}%</Pill>:<Pill>—</Pill>}</Td>)}
          <Td><Pill type={x.total>=80?"success":x.total>=60?"warn":"danger"}>{x.total}%</Pill></Td>
        </tr>)}</tbody>
      </table></div>
    </div>
    {isA&&<div style={wrapS}><div style={headS}><b>Branch Sales</b></div><div style={{padding:"16px 20px"}}>{branches.filter(b=>entries.some(e=>e.bid===b.id&&e.kid==="k1")).map(br=>{
      const s=entries.filter(e=>e.bid===br.id&&e.kid==="k1").reduce((a,e)=>a+e.v,0);
      const t=(bt.find(x=>x.bid===br.id&&x.kid==="k1")||{}).v||1;
      const p=Math.min((s/t)*100,120);
      return<div key={br.id} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><b>{br.name}</b><span style={{color:"#6B7D8E"}}>{(s/1000).toFixed(0)}K/{(t/1000).toFixed(0)}K</span></div>
        <div style={{height:6,background:"#E4EBF0",borderRadius:3,overflow:"hidden"}}><div style={{height:6,borderRadius:3,width:Math.min(p,100)+"%",background:p>=90?"#22C55E":p>=70?"#F58634":"#EF4444"}}/></div></div>
    })}</div></div>}
  </div>;
}

function PharmDash({user,entries,bt,et,branches}){
  const{res,total}=calcScore(user,entries,bt,et);
  const sc=total>=90?"#22C55E":total>=70?"#F58634":"#EF4444";
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:4}}>My Performance</h1>
    <p style={{fontSize:13,color:"#6B7D8E",marginBottom:24}}>{MO} — {branches.find(b=>b.id===user.bid)?.name}</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
      <Card label="Score" value={total+"%"} accent={sc}/><Card label="Met" value={res.filter(r=>r.s!==null&&r.s>=r.k.w).length+"/"+res.filter(r=>r.s!==null).length} accent="#00B4D8"/>
    </div>
    <div style={wrapS}><div style={headS}><b>Breakdown</b></div><div style={{padding:"16px 20px"}}>{res.map((r,i)=>{
      const pw=r.s!==null?Math.min((r.s/r.k.w)*100,150):0;
      const bc=r.s===null?"#E4EBF0":r.s>=r.k.w?"#22C55E":r.s>=r.k.w*.7?"#F58634":"#EF4444";
      return<div key={i} style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <div><b style={{fontSize:13}}>{r.k.name}</b> <Pill type="cyan">{r.k.w}%</Pill></div>
          {r.s!==null?<Pill type={r.s>=r.k.w?"success":"warn"}>{r.s}%</Pill>:<Pill>—</Pill>}
        </div>
        <div style={{height:7,background:"#E4EBF0",borderRadius:4,overflow:"hidden"}}><div style={{height:7,borderRadius:4,width:Math.min(pw,100)+"%",background:bc}}/></div>
      </div>
    })}</div>
    <div style={{padding:"12px 20px",borderTop:"1px solid #E4EBF0",display:"flex",justifyContent:"space-between"}}><b>Total</b><b style={{fontSize:18,color:sc}}>{total}%</b></div>
    </div>
  </div>;
}

function EntryPage({user,emps,entries,setEntries,branches,bt,et}){
  const[se,setSe]=useState("");const[sm,setSm]=useState(MO);const[vals,setVals]=useState({});
  const ph=emps.filter(e=>e.role==="pharmacist");const em=ph.find(e=>e.id===se);
  const save=()=>{if(!se||!em)return;const n=Object.entries(vals).filter(([,v])=>v!=="").map(([kid,v])=>({eid:se,kid,bid:em.bid,v:Number(v),mo:sm,by:user.id}));setEntries(p=>[...p.filter(e=>!(e.eid===se&&e.mo===sm&&n.some(x=>x.kid===e.kid))),...n]);setVals({});};
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:24}}>KPI Entry</h1>
    <div style={{maxWidth:560}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div><label style={LS}>Pharmacist</label><select value={se} onChange={e=>{setSe(e.target.value);setVals({})}} style={IS}><option value="">Select...</option>{ph.map(p=><option key={p.id} value={p.id}>{p.name} — {branches.find(b=>b.id===p.bid)?.name}</option>)}</select></div>
        <div><label style={LS}>Month</label><input type="month" value={sm} onChange={e=>setSm(e.target.value)} style={IS}/></div>
      </div>
      {em&&KPIS.map(k=>{const ex=entries.find(e=>e.eid===se&&e.kid===k.id&&e.mo===sm);
        let tl="";if(k.tl==="branch"){const t=bt.find(x=>x.bid===em.bid&&x.kid===k.id);tl=t?"Target: "+t.v.toLocaleString():"No target";}
        else if(k.tl==="pharmacist"){const t=et.find(x=>x.eid===em.id&&x.kid===k.id);tl=t?"Target: "+t.v.toLocaleString():"No target";}
        else if(k.tl==="fixed")tl="Target: "+k.ft+"%";
        if(k.code==="expire")tl="≤1.5% of sales";
        return<div key={k.id} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:14,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><div><b style={{fontSize:13}}>{k.name}</b> <Pill type="cyan">{k.w}%</Pill></div><span style={{fontSize:11,color:"#9AABB8"}}>{tl}</span></div>
          <input type="number" placeholder={ex?"Current: "+ex.v:"Enter..."} value={vals[k.id]||""} onChange={e=>setVals({...vals,[k.id]:e.target.value})} style={IS}/>
        </div>})}
      {em&&<button onClick={save} style={BS}>Save</button>}
    </div>
  </div>;
}

function AcctLog({user,entries,emps,branches}){const my=entries.filter(e=>e.by===user.id);return<div><h1 style={{fontSize:26,fontWeight:500,marginBottom:24}}>My Entries</h1>{my.length===0?<p style={{color:"#9AABB8",textAlign:"center",padding:40}}>No entries yet</p>:<div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Month</Th><Th>Pharmacist</Th><Th>Branch</Th><Th>KPI</Th><Th>Value</Th></tr></thead><tbody>{my.map((e,i)=><tr key={i} style={{borderBottom:"1px solid #E4EBF0"}}><Td>{e.mo}</Td><Td>{emps.find(x=>x.id===e.eid)?.name}</Td><Td>{branches.find(b=>b.id===e.bid)?.name}</Td><Td>{KPIS.find(k=>k.id===e.kid)?.name}</Td><Td b>{e.v.toLocaleString()}</Td></tr>)}</tbody></table></div>}</div>}

function EmpsPage({emps,setEmps,branches}){const[show,setShow]=useState(false);const[f,setF]=useState({name:"",role:"pharmacist",bid:BRANCHES[0].id});
  const add=()=>{if(!f.name)return;setEmps(p=>[...p,{id:"e"+Date.now(),...f,email:"",active:true}]);setF({name:"",role:"pharmacist",bid:BRANCHES[0].id});setShow(false);};
  return<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><h1 style={{fontSize:26,fontWeight:500}}>Employees</h1><button onClick={()=>setShow(true)} style={BS}>+ Add</button></div>
    <div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Name</Th><Th>Role</Th><Th>Branch</Th><Th>Status</Th><Th>Action</Th></tr></thead>
      <tbody>{emps.map(e=><tr key={e.id} style={{borderBottom:"1px solid #E4EBF0"}}><Td b>{e.name}</Td><Td><RP role={e.role}/></Td><Td>{branches.find(b=>b.id===e.bid)?.name||"All"}</Td><Td><Pill type={e.active?"success":"danger"}>{e.active?"Active":"Off"}</Pill></Td><Td><button onClick={()=>setEmps(p=>p.map(x=>x.id===e.id?{...x,active:!x.active}:x))} style={{...BG,fontSize:11,padding:"4px 10px"}}>{e.active?"Deactivate":"Activate"}</button></Td></tr>)}</tbody></table></div>
    <Modal open={show} onClose={()=>setShow(false)} title="Add Employee">
      <div style={{marginBottom:14}}><label style={LS}>Name</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} style={IS}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={LS}>Role</label><select value={f.role} onChange={e=>setF({...f,role:e.target.value})} style={IS}><option value="pharmacist">Pharmacist</option><option value="manager">Manager</option><option value="accountant">Accountant</option><option value="admin">Admin</option></select></div>
        <div><label style={LS}>Branch</label><select value={f.bid} onChange={e=>setF({...f,bid:e.target.value})} style={IS}><option value="">None</option>{branches.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select></div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setShow(false)} style={BG}>Cancel</button><button onClick={add} style={BS}>Add</button></div>
    </Modal>
  </div>;
}

    {tab==="et"&&<div><div style={{marginBottom:16,maxWidth:200}}><label style={LS}>Month</label><input type="month" value={tm} onChange={e=>setTm(e.target.value)} style={IS}/></div><div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Pharmacist</Th><Th>Branch</Th>{eK.map(k=><Th key={k.id}>{k.name}</Th>)}</tr></thead><tbody>{pharms.map(e=><tr key={e.id} style={{borderBottom:"1px solid #E4EBF0"}}><Td b>{e.name}</Td><Td>{branches.find(b=>b.id===e.bid)?.name}</Td>{eK.map(k=>{const t=et.find(x=>x.eid===e.id&&x.kid===k.id&&x.mo===tm);return<Td key={k.id}><input type="number" style={{...IS,width:100}} value={t?.v||""} placeholder="..." onChange={ev=>uET(e.id,k.id,ev.target.value)}/></Td>})}</tr>)}</tbody></table></div></div>}

      </div>
      <div style={{padding:"8px 10px",borderTop:"1px solid #E4EBF0"}}>
        <div style={{fontSize:9,color:"#9AABB8",marginBottom:3,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Demo</div>
        <select value={user.id} onChange={e=>{const u=emps.find(x=>x.id===e.target.value);setUser(u);setPage(u.role==="accountant"?"entry":"dashboard");}} style={{...IS,fontSize:11,padding:"5px 8px"}}>{emps.map(e=><option key={e.id} value={e.id}>{e.name} ({e.role})</option>)}</select>
      </div>
      <div style={{padding:14,borderTop:"1px solid #E4EBF0",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:r==="accountant"?"linear-gradient(135deg,#F58634,#D46A1A)":"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff"}}>{user.name[0]}</div>
        <div><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><RP role={r}/></div>
      </div>
    </div>
    <div style={{flex:1,padding:"24px 28px",overflowY:"auto"}}>
      {page==="dashboard"&&r==="pharmacist"&&<PharmDash user={user} entries={entries} bt={bt} et={et} branches={branches}/>}
      {page==="dashboard"&&(r==="admin"||r==="manager")&&<Dashboard user={user} emps={emps} entries={entries} bt={bt} et={et} branches={branches}/>}
      {page==="entry"&&<EntryPage user={user} emps={emps} entries={entries} setEntries={setEntries} branches={branches} bt={bt} et={et}/>}
      {page==="mylog"&&<AcctLog user={user} entries={entries} emps={emps} branches={branches}/>}
      {page==="emps"&&<EmpsPage emps={emps} setEmps={setEmps} branches={branches}/>}
      {page==="tasks"&&<TasksPage user={user} emps={emps} tasks={tasks} setTasks={setTasks}/>}
      {page==="msgs"&&<MsgsPage user={user} emps={emps} anns={anns} setAnns={setAnns} dms={dms} setDms={setDms}/>}
      {page==="files"&&<FilesPage user={user} branches={branches}/>}
      {page==="settings"&&<SettingsPage emps={emps} branches={branches} setBranches={setBranches} bt={bt} setBt={setBt} et={et} setEt={setEt} ap={ap} setAp={setAp}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
