function calcScore(emp,entries,bt,et){
  const sv=(entries.find(e=>e.eid===emp.id&&e.kid==="k1")||{}).v||0;
  const res=KPIS.map(k=>{
    const en=entries.find(e=>e.eid===emp.id&&e.kid===k.id);
    if(!en)return{k,v:null,t:null,s:null};
    let t=null;
    if(k.tl==="branch")t=(bt.find(x=>x.bid===emp.bid&&x.kid===k.id)||{}).v;
    else if(k.tl==="pharmacist")t=(et.find(x=>x.eid===emp.id&&x.kid===k.id)||{}).v;
    else if(k.tl==="fixed")t=k.ft;
    let s=0;
    if(k.st==="bin"){const p=sv>0?(en.v/sv)*100:100;s=p<=(k.bt||1.5)?k.w:0;}
    else if(t&&t>0){s=(en.v/t)*k.w;if(k.cap)s=Math.min(s,k.w);}
    return{k,v:en.v,t,s:Math.round(s*100)/100};
  });
  return{res,total:Math.round(res.reduce((a,r)=>a+(r.s||0),0)*100)/100};
}

const tAgo=d=>{const m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<60)return m+"m";const h=Math.floor(m/60);return h<24?h+"h":Math.floor(h/24)+"d";};

const IS={background:"#F7F9FC",border:"1px solid #E4EBF0",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#1A2B3C",width:"100%",outline:"none",fontFamily:"inherit",boxSizing:"border-box"};
const BS={padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",background:"linear-gradient(135deg,#00B4D8,#0077B6)",color:"#fff",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:6};
const BG={padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",background:"transparent",color:"#6B7D8E",border:"1px solid #E4EBF0",fontFamily:"inherit"};
const LS={fontSize:11,color:"#6B7D8E",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:5,fontWeight:600};
const TS={padding:"7px 14px",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer",border:"none",fontFamily:"inherit"};
const cardS={background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"18px 20px",position:"relative",overflow:"hidden"};
const acS={position:"absolute",top:0,left:0,right:0,height:3};
const wrapS={background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,overflow:"hidden",marginBottom:20};
const headS={padding:"14px 20px",borderBottom:"1px solid #E4EBF0",display:"flex",justifyContent:"space-between",alignItems:"center"};

function Pill({type,children}){const c={success:"#F0FDF4,#16A34A",danger:"#FEF2F2,#EF4444",warn:"#FFFBEB,#D97706",cyan:"#E8F8FC,#0077B6",orange:"#FEF3E8,#D46A1A",gray:"#F1F5F9,#6B7D8E"};const[bg,fg]=(c[type]||c.gray).split(",");return<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:bg,color:fg}}>{children}</span>}
function Modal({open,onClose,title,children}){if(!open)return null;return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}><div style={{background:"#fff",borderRadius:16,padding:28,width:480,maxWidth:"92vw",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}><h2 style={{fontSize:18,fontWeight:600,marginBottom:18}}>{title}</h2>{children}</div></div>}
function RP({role}){const c={admin:["#E8F8FC","#0077B6"],accountant:["#FEF3E8","#D46A1A"],manager:["#EDE9FE","#7C3AED"],pharmacist:["#F0FDF4","#16A34A"]};const[bg,fg]=c[role]||c.pharmacist;return<span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",padding:"2px 6px",borderRadius:4,background:bg,color:fg}}>{role}</span>}
function Th({children}){return<th style={{textAlign:"left",padding:"10px 16px",fontSize:10,color:"#9AABB8",textTransform:"uppercase",letterSpacing:.8,borderBottom:"1px solid #E4EBF0",fontWeight:600}}>{children}</th>}
function Td({children,b}){return<td style={{padding:"10px 16px",fontSize:13,fontWeight:b?600:400}}>{children}</td>}
function Card({label,value,accent,sub,sm}){return<div style={cardS}><div style={{...acS,background:accent}}/><div style={{fontSize:11,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:6,fontWeight:600}}>{label}</div><div style={{fontSize:sm?16:26,fontWeight:700,letterSpacing:sm?0:-1}}>{value}</div>{sub&&<div style={{fontSize:11,color:"#9AABB8",marginTop:4}}>{sub}</div>}</div>}

function Dashboard({user,emps,entries,bt,et,branches}){
  const isA=user.role==="admin";
  const ph=emps.filter(e=>e.role==="pharmacist"&&(isA||e.bid===user.bid));
  const sc=ph.map(p=>({e:p,...calcScore(p,entries,bt,et)}));
  const sorted=[...sc].sort((a,b)=>b.total-a.total);
  const avg=sc.length?Math.round(sc.reduce((s,x)=>s+x.total,0)/sc.length*10)/10:0;
  const top=sorted[0];
  const sales=entries.filter(e=>e.kid==="k1"&&(isA||emps.find(x=>x.id===e.eid)?.bid===user.bid)).reduce((s,e)=>s+e.v,0);
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:4}}>{isA?"Overview Dashboard":"Branch Dashboard"}</h1>
    <p style={{fontSize:13,color:"#6B7D8E",marginBottom:24}}>{MO}</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14,marginBottom:24}}>
      <Card label="Avg Score" value={avg+"%"} accent="#00B4D8"/>
      <Card label="Sales" value={(sales/1000).toFixed(0)+"K"} accent="#F58634" sub="SAR"/>
      <Card label="Active" value={ph.filter(p=>entries.some(e=>e.eid===p.id)).length+"/"+ph.length} accent="#22C55E"/>
      {top&&<Card label="Top" value={top.e.name} accent="#F59E0B" sub={top.total+"%"} sm/>}
    </div>
    <div style={wrapS}><div style={headS}><b>Scoreboard</b></div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
        <thead><tr><Th>Name</Th><Th>Branch</Th>{KPIS.map(k=><Th key={k.id}>{k.name} ({k.w}%)</Th>)}<Th>Total</Th></tr></thead>
        <tbody>{sorted.map(x=><tr key={x.e.id} style={{borderBottom:"1px solid #E4EBF0"}}>
          <Td b>{x.e.name}</Td><Td>{branches.find(b=>b.id===x.e.bid)?.name}</Td>
          {x.res.map((r,i)=><Td key={i}>{r.s!==null?<Pill type={r.s>=r.k.w?"success":r.s>=r.k.w*.7?"warn":"danger"}>{r.s}%</Pill>:<Pill>—</Pill>}</Td>)}
          <Td><Pill type={x.total>=80?"success":x.total>=60?"warn":"danger"}>{x.total}%</Pill></Td>
        </tr>)}</tbody>
      </table></div>
    </div>
    {isA&&<div style={wrapS}><div style={headS}><b>Branch Sales</b></div><div style={{padding:"16px 20px"}}>{branches.filter(b=>entries.some(e=>e.bid===b.id&&e.kid==="k1")).map(br=>{
      const s=entries.filter(e=>e.bid===br.id&&e.kid==="k1").reduce((a,e)=>a+e.v,0);
      const t=(bt.find(x=>x.bid===br.id&&x.kid==="k1")||{}).v||1;
      const p=Math.min((s/t)*100,120);
      return<div key={br.id} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><b>{br.name}</b><span style={{color:"#6B7D8E"}}>{(s/1000).toFixed(0)}K/{(t/1000).toFixed(0)}K</span></div>
        <div style={{height:6,background:"#E4EBF0",borderRadius:3,overflow:"hidden"}}><div style={{height:6,borderRadius:3,width:Math.min(p,100)+"%",background:p>=90?"#22C55E":p>=70?"#F58634":"#EF4444"}}/></div></div>
    })}</div></div>}
  </div>;
}

function PharmDash({user,entries,bt,et,branches}){
  const{res,total}=calcScore(user,entries,bt,et);
  const sc=total>=90?"#22C55E":total>=70?"#F58634":"#EF4444";
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:4}}>My Performance</h1>
    <p style={{fontSize:13,color:"#6B7D8E",marginBottom:24}}>{MO} — {branches.find(b=>b.id===user.bid)?.name}</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
      <Card label="Score" value={total+"%"} accent={sc}/><Card label="Met" value={res.filter(r=>r.s!==null&&r.s>=r.k.w).length+"/"+res.filter(r=>r.s!==null).length} accent="#00B4D8"/>
    </div>
    <div style={wrapS}><div style={headS}><b>Breakdown</b></div><div style={{padding:"16px 20px"}}>{res.map((r,i)=>{
      const pw=r.s!==null?Math.min((r.s/r.k.w)*100,150):0;
      const bc=r.s===null?"#E4EBF0":r.s>=r.k.w?"#22C55E":r.s>=r.k.w*.7?"#F58634":"#EF4444";
      return<div key={i} style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <div><b style={{fontSize:13}}>{r.k.name}</b> <Pill type="cyan">{r.k.w}%</Pill></div>
          {r.s!==null?<Pill type={r.s>=r.k.w?"success":"warn"}>{r.s}%</Pill>:<Pill>—</Pill>}
        </div>
        <div style={{height:7,background:"#E4EBF0",borderRadius:4,overflow:"hidden"}}><div style={{height:7,borderRadius:4,width:Math.min(pw,100)+"%",background:bc}}/></div>
      </div>
    })}</div>
    <div style={{padding:"12px 20px",borderTop:"1px solid #E4EBF0",display:"flex",justifyContent:"space-between"}}><b>Total</b><b style={{fontSize:18,color:sc}}>{total}%</b></div>
    </div>
  </div>;
}

function EntryPage({user,emps,entries,setEntries,branches,bt,et}){
  const[se,setSe]=useState("");const[sm,setSm]=useState(MO);const[vals,setVals]=useState({});
  const ph=emps.filter(e=>e.role==="pharmacist");const em=ph.find(e=>e.id===se);
  const save=()=>{if(!se||!em)return;const n=Object.entries(vals).filter(([,v])=>v!=="").map(([kid,v])=>({eid:se,kid,bid:em.bid,v:Number(v),mo:sm,by:user.id}));setEntries(p=>[...p.filter(e=>!(e.eid===se&&e.mo===sm&&n.some(x=>x.kid===e.kid))),...n]);setVals({});};
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:24}}>KPI Entry</h1>
    <div style={{maxWidth:560}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div><label style={LS}>Pharmacist</label><select value={se} onChange={e=>{setSe(e.target.value);setVals({})}} style={IS}><option value="">Select...</option>{ph.map(p=><option key={p.id} value={p.id}>{p.name} — {branches.find(b=>b.id===p.bid)?.name}</option>)}</select></div>
        <div><label style={LS}>Month</label><input type="month" value={sm} onChange={e=>setSm(e.target.value)} style={IS}/></div>
      </div>
      {em&&KPIS.map(k=>{const ex=entries.find(e=>e.eid===se&&e.kid===k.id&&e.mo===sm);
        let tl="";if(k.tl==="branch"){const t=bt.find(x=>x.bid===em.bid&&x.kid===k.id);tl=t?"Target: "+t.v.toLocaleString():"No target";}
        else if(k.tl==="pharmacist"){const t=et.find(x=>x.eid===em.id&&x.kid===k.id);tl=t?"Target: "+t.v.toLocaleString():"No target";}
        else if(k.tl==="fixed")tl="Target: "+k.ft+"%";
        if(k.code==="expire")tl="≤1.5% of sales";
        return<div key={k.id} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:14,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><div><b style={{fontSize:13}}>{k.name}</b> <Pill type="cyan">{k.w}%</Pill></div><span style={{fontSize:11,color:"#9AABB8"}}>{tl}</span></div>
          <input type="number" placeholder={ex?"Current: "+ex.v:"Enter..."} value={vals[k.id]||""} onChange={e=>setVals({...vals,[k.id]:e.target.value})} style={IS}/>
        </div>})}
      {em&&<button onClick={save} style={BS}>Save</button>}
    </div>
  </div>;
}

function AcctLog({user,entries,emps,branches}){const my=entries.filter(e=>e.by===user.id);return<div><h1 style={{fontSize:26,fontWeight:500,marginBottom:24}}>My Entries</h1>{my.length===0?<p style={{color:"#9AABB8",textAlign:"center",padding:40}}>No entries yet</p>:<div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Month</Th><Th>Pharmacist</Th><Th>Branch</Th><Th>KPI</Th><Th>Value</Th></tr></thead><tbody>{my.map((e,i)=><tr key={i} style={{borderBottom:"1px solid #E4EBF0"}}><Td>{e.mo}</Td><Td>{emps.find(x=>x.id===e.eid)?.name}</Td><Td>{branches.find(b=>b.id===e.bid)?.name}</Td><Td>{KPIS.find(k=>k.id===e.kid)?.name}</Td><Td b>{e.v.toLocaleString()}</Td></tr>)}</tbody></table></div>}</div>}

function EmpsPage({emps,setEmps,branches}){
  const[show,setShow]=useState(false);
  const[editId,setEditId]=useState(null);
  const[delId,setDelId]=useState(null);
  const blank={name:"",phone:"",email:"",role:"pharmacist",bid:BRANCHES[0].id};
  const[f,setF]=useState(blank);

  const openAdd=()=>{setF(blank);setEditId(null);setShow(true);};
  const openEdit=(e)=>{setF({name:e.name,phone:e.phone||"",email:e.email||"",role:e.role,bid:e.bid||""});setEditId(e.id);setShow(true);};

  const save=()=>{
    if(!f.name)return;
    if(editId){
      setEmps(p=>p.map(x=>x.id===editId?{...x,...f}:x));
    }else{
      setEmps(p=>[...p,{id:"e"+Date.now(),...f,active:true}]);
    }
    setF(blank);setEditId(null);setShow(false);
  };

  const confirmDel=()=>{setEmps(p=>p.filter(x=>x.id!==delId));setDelId(null);};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><h1 style={{fontSize:26,fontWeight:500}}>Employees</h1><button onClick={openAdd} style={BS}>+ Add</button></div>
    <div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Name</Th><Th>Role</Th><Th>Branch</Th><Th>Phone</Th><Th>Email</Th><Th>Status</Th><Th>Actions</Th></tr></thead>
      <tbody>{emps.map(e=><tr key={e.id} style={{borderBottom:"1px solid #E4EBF0"}}>
        <Td b>{e.name}</Td>
        <Td><RP role={e.role}/></Td>
        <Td>{branches.find(b=>b.id===e.bid)?.name||"All"}</Td>
        <Td>{e.phone||"—"}</Td>
        <Td>{e.email||"—"}</Td>
        <Td><Pill type={e.active?"success":"danger"}>{e.active?"Active":"Off"}</Pill></Td>
        <Td>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

        {f.tt==="employee"&&<div><label style={LS}>Who</label><select value={f.te} onChange={e=>setF({...f,te:e.target.value})} style={IS}><option value="">Select...</option>{emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>}

function FilesPage({user,branches,files,setFiles,folders,setFolders}){
  const[showFolder,setShowFolder]=useState(false);const[nf,setNf]=useState("");
  const[curFolder,setCurFolder]=useState(null);
  const my=files.filter(f=>user.role==="admin"||f.tt==="all"||(f.tt==="branch"&&f.tid===user.bid));
  const myFolders=folders.filter(f=>f.parent===curFolder);
  const myFiles=my.filter(f=>f.fid===curFolder);
  const addFolder=()=>{if(!nf)return;setFolders(p=>[...p,{id:"fl"+Date.now(),name:nf,parent:curFolder}]);setNf("");setShowFolder(false);};
  const breadcrumb=[];
  let bc=curFolder;
  while(bc){const fl=folders.find(f=>f.id===bc);if(fl){breadcrumb.unshift(fl);bc=fl.parent;}else break;}

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><h1 style={{fontSize:26,fontWeight:500}}>File Stash</h1>
        <div style={{display:"flex",gap:4,alignItems:"center",fontSize:13,color:"#6B7D8E",marginTop:4}}>
          <span onClick={()=>setCurFolder(null)} style={{cursor:"pointer",color:curFolder?"#00B4D8":"#1A2B3C",fontWeight:curFolder?500:600}}>All Files</span>
          {breadcrumb.map(f=><span key={f.id} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{color:"#D0DAE2"}}>/</span>
            <span onClick={()=>setCurFolder(f.id)} style={{cursor:"pointer",color:f.id===curFolder?"#1A2B3C":"#00B4D8",fontWeight:f.id===curFolder?600:500}}>{f.name}</span>
          </span>)}
        </div>
      </div>
      {user.role==="admin"&&<div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowFolder(true)} style={BG}>+ Folder</button>
        <button onClick={()=>{const name=prompt("File name:");if(name)setFiles(p=>[...p,{id:"f"+Date.now(),name,type:name.endsWith(".pdf")?"pdf":"img",tt:"all",tid:null,desc:"",fid:curFolder}]);}} style={BS}>+ File</button>
      </div>}
    </div>

    {myFolders.length>0&&<div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Folders</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
        {myFolders.map(f=><div key={f.id} onClick={()=>setCurFolder(f.id)} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"border-color .15s"}}>
          <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#E8F8FC,#FEF3E8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📁</div>
          <div><div style={{fontWeight:600,fontSize:13}}>{f.name}</div>
            <div style={{fontSize:11,color:"#9AABB8"}}>{files.filter(x=>x.fid===f.id).length} files</div></div>
        </div>)}
      </div>
    </div>}

    {myFiles.length>0&&<div>
      <div style={{fontSize:11,fontWeight:600,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Files</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {myFiles.map(f=><div key={f.id} style={{background:"#fff",border:"1px solid #E4EBF0",borderRadius:12,padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:40,height:40,borderRadius:10,background:f.type==="pdf"?"#FEE2E2":"#DBEAFE",color:f.type==="pdf"?"#DC2626":"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11}}>{f.type==="pdf"?"PDF":"IMG"}</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{f.name}</div>{f.desc&&<div style={{fontSize:11,color:"#6B7D8E"}}>{f.desc}</div>}<Pill type={f.tt==="all"?"cyan":"orange"}>{f.tt==="all"?"All":"Branch"}</Pill></div>
          {user.role==="admin"&&<button onClick={()=>setFiles(p=>p.filter(x=>x.id!==f.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:14,opacity:.4}}>✕</button>}
        </div>)}
      </div>
    </div>}

    {myFolders.length===0&&myFiles.length===0&&<p style={{color:"#9AABB8",textAlign:"center",padding:40}}>{curFolder?"This folder is empty":"No files yet"}</p>}

    <Modal open={showFolder} onClose={()=>setShowFolder(false)} title="New Folder">
      <div style={{marginBottom:14}}><label style={LS}>Folder Name</label><input value={nf} onChange={e=>setNf(e.target.value)} style={IS} placeholder="e.g. SOPs, Training, Reports..."/></div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setShowFolder(false)} style={BG}>Cancel</button><button onClick={addFolder} style={BS}>Create</button></div>

function SettingsPage({emps,branches,setBranches,bt,setBt,et,setEt,ap,setAp,kpis,setKpis}){
  const[tab,setTab]=useState("kpis");const[showAdd,setShowAdd]=useState(false);const[nb,setNb]=useState("");const[tm,setTm]=useState(MO);
  const[editKpi,setEditKpi]=useState(null);const[kw,setKw]=useState("");
  const accts=emps.filter(e=>e.role==="accountant");const pharms=emps.filter(e=>e.role==="pharmacist");
  const bK=kpis.filter(k=>k.tl==="branch"&&k.code!=="expire");const eK=kpis.filter(k=>k.tl==="pharmacist");
  const addB=()=>{if(!nb)return;setBranches(p=>[...p,{id:"b"+Date.now(),name:nb}]);setNb("");setShowAdd(false);};
  const uBT=(bid,kid,v)=>setBt(p=>{const i=p.findIndex(t=>t.bid===bid&&t.kid===kid&&t.mo===tm);if(i>=0){const n=[...p];n[i]={...n[i],v:Number(v)};return n;}return[...p,{bid,kid,v:Number(v),mo:tm}];});
  const uET=(eid,kid,v)=>setEt(p=>{const i=p.findIndex(t=>t.eid===eid&&t.kid===kid&&t.mo===tm);if(i>=0){const n=[...p];n[i]={...n[i],v:Number(v)};return n;}return[...p,{eid,kid,v:Number(v),mo:tm}];});
  const tP=(aid,kid)=>setAp(p=>p.some(x=>x.eid===aid&&x.kid===kid)?p.filter(x=>!(x.eid===aid&&x.kid===kid)):[...p,{id:"ap"+Date.now(),eid:aid,kid}]);
  const saveWeight=()=>{if(editKpi&&kw!==""){setKpis(p=>p.map(k=>k.id===editKpi?{...k,w:Number(kw)}:k));setEditKpi(null);setKw("");}};
  const totalW=kpis.reduce((s,k)=>s+k.w,0);
  const tabs=[{id:"kpis",l:"KPIs"},{id:"bt",l:"Branch Targets"},{id:"et",l:"Emp Targets"},{id:"ap",l:"Accountant"},{id:"br",l:"Branches"}];
  return<div>
    <h1 style={{fontSize:26,fontWeight:500,marginBottom:20}}>Settings</h1>
    <div style={{display:"flex",gap:4,marginBottom:20,background:"#fff",borderRadius:10,padding:4,border:"1px solid #E4EBF0",width:"fit-content",flexWrap:"wrap"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{...TS,background:tab===t.id?"linear-gradient(135deg,#00B4D8,#0077B6)":"transparent",color:tab===t.id?"#fff":"#6B7D8E"}}>{t.l}</button>)}
    </div>
    {tab==="kpis"&&<div style={wrapS}><div style={headS}><b>KPI Definitions</b><span style={{fontSize:11,color:totalW===100?"#22C55E":"#EF4444",fontWeight:600}}>Total: {totalW}% {totalW!==100&&"(should be 100%)"}</span></div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>KPI</Th><Th>Input</Th><Th>Weight</Th><Th>Target</Th><Th>Scoring</Th><Th>Cap</Th><Th>Edit</Th></tr></thead><tbody>{kpis.map(k=><tr key={k.id} style={{borderBottom:"1px solid #E4EBF0"}}><Td b>{k.name}</Td><Td><Pill type={k.inp==="sar"?"success":k.inp==="pct"?"cyan":"orange"}>{k.inp.toUpperCase()}</Pill></Td><Td b>{k.w}%</Td><Td><Pill type={k.tl==="branch"?"orange":"cyan"}>{k.tl}</Pill></Td><Td>{k.st==="bin"?<Pill type="danger">Binary</Pill>:<Pill type="cyan">Proportional</Pill>}</Td><Td>{k.cap?<Pill type="warn">Capped</Pill>:<Pill type="success">No cap</Pill>}</Td><Td><button onClick={()=>{setEditKpi(k.id);setKw(String(k.w));}} style={{...BG,fontSize:11,padding:"4px 10px",color:"#0077B6",borderColor:"#00B4D8"}}>Edit weight</button></Td></tr>)}</tbody></table></div>}
    {tab==="bt"&&<div><div style={{marginBottom:16,maxWidth:200}}><label style={LS}>Month</label><input type="month" value={tm} onChange={e=>setTm(e.target.value)} style={IS}/></div><div style={wrapS}><div style={headS}><b>Sales Targets — {tm}</b></div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Branch</Th>{bK.map(k=><Th key={k.id}>{k.name}</Th>)}</tr></thead><tbody>{branches.map(br=><tr key={br.id} style={{borderBottom:"1px solid #E4EBF0"}}><Td b>{br.name}</Td>{bK.map(k=>{const t=bt.find(x=>x.bid===br.id&&x.kid===k.id&&x.mo===tm);return<Td key={k.id}><input type="number" style={{...IS,width:130}} value={t?.v||""} placeholder="Set..." onChange={e=>uBT(br.id,k.id,e.target.value)}/></Td>})}</tr>)}</tbody></table></div></div>}
    {tab==="et"&&<div><div style={{marginBottom:16,maxWidth:200}}><label style={LS}>Month</label><input type="month" value={tm} onChange={e=>setTm(e.target.value)} style={IS}/></div><div style={wrapS}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><Th>Pharmacist</Th><Th>Branch</Th>{eK.map(k=><Th key={k.id}>{k.name}</Th>)}</tr></thead><tbody>{pharms.map(e=><tr key={e.id} style={{borderBottom:"1px solid #E4EBF0"}}><Td b>{e.name}</Td><Td>{branches.find(b=>b.id===e.bid)?.name}</Td>{eK.map(k=>{const t=et.find(x=>x.eid===e.id&&x.kid===k.id&&x.mo===tm);return<Td key={k.id}><input type="number" style={{...IS,width:100}} value={t?.v||""} placeholder="..." onChange={ev=>uET(e.id,k.id,ev.target.value)}/></Td>})}</tr>)}</tbody></table></div></div>}
    {tab==="ap"&&<div>{accts.length===0?<p style={{color:"#9AABB8",textAlign:"center",padding:40}}>No accountants</p>:accts.map(ac=><div key={ac.id} style={wrapS}><div style={{...headS}}><b>{ac.name}</b><Pill type="orange">{ap.filter(p=>p.eid===ac.id).length}/{kpis.length}</Pill></div><div style={{padding:16,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>{kpis.map(k=>{const has=ap.some(p=>p.eid===ac.id&&p.kid===k.id);return<label key={k.id} style={{display:"flex",gap:8,padding:"10px 12px",background:has?"#E8F8FC":"#F7F9FC",border:"1px solid "+(has?"#00B4D8":"#E4EBF0"),borderRadius:8,cursor:"pointer"}}><input type="checkbox" checked={has} onChange={()=>tP(ac.id,k.id)}/><div><div style={{fontWeight:600,fontSize:12}}>{k.name}</div><div style={{fontSize:10,color:"#9AABB8"}}>{k.w}%</div></div></label>})}</div></div>)}</div>}
    {tab==="br"&&<div><button onClick={()=>setShowAdd(true)} style={{...BS,marginBottom:16}}>+ Branch</button><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>{branches.map(br=><div key={br.id} style={cardS}><div style={{...acS,background:"linear-gradient(90deg,#00B4D8,#F58634)"}}/><b style={{fontSize:16}}>{br.name}</b><div style={{fontSize:12,color:"#6B7D8E"}}>{emps.filter(e=>e.bid===br.id).length} employees</div></div>)}</div><Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Add Branch"><div style={{marginBottom:14}}><label style={LS}>Name</label><input value={nb} onChange={e=>setNb(e.target.value)} style={IS}/></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setShowAdd(false)} style={BG}>Cancel</button><button onClick={addB} style={BS}>Add</button></div></Modal></div>}
    <Modal open={!!editKpi} onClose={()=>{setEditKpi(null);setKw("");}} title={"Edit Weight — "+(kpis.find(k=>k.id===editKpi)?.name||"")}>
      <p style={{fontSize:13,color:"#6B7D8E",marginBottom:14}}>Current total weight: <b style={{color:totalW===100?"#22C55E":"#EF4444"}}>{totalW}%</b>. Changing this KPI from {kpis.find(k=>k.id===editKpi)?.w}% to:</p>
      <div style={{marginBottom:14}}><label style={LS}>New Weight (%)</label><input type="number" value={kw} onChange={e=>setKw(e.target.value)} style={IS} min="0" max="100"/></div>
      <p style={{fontSize:12,color:"#9AABB8",marginBottom:14}}>New total will be: <b>{totalW-(kpis.find(k=>k.id===editKpi)?.w||0)+Number(kw||0)}%</b></p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>{setEditKpi(null);setKw("");}} style={BG}>Cancel</button><button onClick={saveWeight} style={BS}>Save</button></div>
    </Modal>
  </div>;
}

function LoginPage({onLogin,emps}){const[email,setEmail]=useState("");const[err,setErr]=useState("");
  const go=()=>{const e=emps.find(x=>x.email===email);if(e){onLogin(e);setErr("");}else setErr("Not found. Try moamen@firstbrand.sa");};
  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#F0FBFE,#FEF3E8)"}}>
    <div style={{width:380,maxWidth:"92vw"}}><div style={{textAlign:"center",marginBottom:28}}>
      <div style={{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#00B4D8,#0077B6)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}><span style={{color:"#fff",fontSize:26,fontWeight:700}}>F</span></div>
      <h1 style={{fontSize:22,color:"#0077B6"}}>First Brand Pharmacy</h1></div>
      <div style={{background:"#fff",borderRadius:16,padding:24,boxShadow:"0 8px 24px rgba(0,0,0,.06)"}}>
        <div style={{marginBottom:14}}><label style={LS}>Email</label><input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} style={{...IS,padding:12}} placeholder="name@firstbrand.sa"/></div>
        <div style={{marginBottom:14}}><label style={LS}>Password</label><input type="password" style={{...IS,padding:12}} placeholder="••••••••"/></div>
        {err&&<div style={{fontSize:12,color:"#EF4444",marginBottom:12,padding:8,background:"#FEF2F2",borderRadius:8}}>{err}</div>}
        <button onClick={go} style={{...BS,width:"100%",padding:12,fontSize:14,justifyContent:"center"}}>Sign In</button>
        <p style={{marginTop:14,fontSize:10,color:"#9AABB8",textAlign:"center"}}>Demo: moamen@ · sara@ · khalid@ · ahmed@ @firstbrand.sa</p>
      </div>
    </div>
  </div>;
}

function App(){
// localStorage helpers
function loadState(key,fallback){try{const v=localStorage.getItem("fb_"+key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
function saveState(key,val){try{localStorage.setItem("fb_"+key,JSON.stringify(val));}catch(e){}}

function App(){
  const[loggedIn,setLoggedIn]=useState(()=>loadState("loggedIn",true));
  const[page,setPage]=useState(()=>loadState("page","dashboard"));
  const[user,setUser]=useState(()=>loadState("user",EMPS[0]));
  const[emps,setEmps]=useState(()=>loadState("emps",EMPS));
  const[kpis,setKpis]=useState(()=>loadState("kpis",KPIS));
  const[entries,setEntries]=useState(()=>loadState("entries",I_EN));
  const[anns,setAnns]=useState(()=>loadState("anns",I_ANN));
  const[dms,setDms]=useState(()=>loadState("dms",[]));
  const[tasks,setTasks]=useState(()=>loadState("tasks",I_TASKS));
  const[branches,setBranches]=useState(()=>loadState("branches",BRANCHES));
  const[bt,setBt]=useState(()=>loadState("bt",I_BT));
  const[et,setEt]=useState(()=>loadState("et",I_ET));
  const[ap,setAp]=useState(()=>loadState("ap",[{id:"ap1",eid:"e2",kid:"k1"},{id:"ap2",eid:"e2",kid:"k4"}]));
  const[files,setFiles]=useState(()=>loadState("files",I_FILES.map(f=>({...f,fid:null}))));
  const[folders,setFolders]=useState(()=>loadState("folders",[{id:"fl1",name:"SOPs",parent:null},{id:"fl2",name:"Training",parent:null},{id:"fl3",name:"Reports",parent:null}]));
  const[mobMenu,setMobMenu]=useState(false);

  // Auto-save to localStorage
  React.useEffect(()=>{saveState("loggedIn",loggedIn)},[loggedIn]);
  React.useEffect(()=>{saveState("page",page)},[page]);
  React.useEffect(()=>{saveState("user",user)},[user]);
  React.useEffect(()=>{saveState("emps",emps)},[emps]);
  React.useEffect(()=>{saveState("kpis",kpis)},[kpis]);
  React.useEffect(()=>{saveState("entries",entries)},[entries]);
  React.useEffect(()=>{saveState("anns",anns)},[anns]);
  React.useEffect(()=>{saveState("dms",dms)},[dms]);
  React.useEffect(()=>{saveState("tasks",tasks)},[tasks]);
  React.useEffect(()=>{saveState("branches",branches)},[branches]);
  React.useEffect(()=>{saveState("bt",bt)},[bt]);
  React.useEffect(()=>{saveState("et",et)},[et]);
  React.useEffect(()=>{saveState("ap",ap)},[ap]);
  React.useEffect(()=>{saveState("files",files)},[files]);
  React.useEffect(()=>{saveState("folders",folders)},[folders]);

  const defPage=(role)=>role==="admin"?"dashboard":role==="accountant"?"entry":"msgs";

  if(!loggedIn)return<LoginPage onLogin={e=>{setUser(e);setLoggedIn(true);setPage(defPage(e.role));}} emps={emps}/>;

  const r=user.role;
  const nav=[
    {id:"msgs",l:"Messages",show:r!=="accountant",badge:dms.filter(d=>d.rid===user.id&&!d.read).length},
    {id:"dashboard",l:"Dashboard",show:r!=="accountant"},
    {id:"entry",l:"KPI Entry",show:r==="admin"||r==="accountant"},
    {id:"mylog",l:"My Entries",show:r==="accountant"},
    {id:"emps",l:"Employees",show:r==="admin"},
    {id:"tasks",l:"Tasks",show:r!=="accountant",badge:tasks.filter(t=>!t.done).length},
    {id:"files",l:"Files",show:r!=="accountant"},
    {id:"settings",l:"Settings",show:r==="admin"}
  ];

  const resetData=()=>{if(confirm("Reset all data to demo defaults? This cannot be undone.")){
    ["loggedIn","page","user","emps","kpis","entries","anns","dms","tasks","branches","bt","et","ap","files","folders"].forEach(k=>localStorage.removeItem("fb_"+k));
    location.reload();
  }};

  const sidebarContent=<>
    <div style={{padding:"20px 16px",borderBottom:"1px solid #E4EBF0",display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:"#fff",fontSize:18,fontWeight:700}}>F</span></div>
      <div><div style={{fontSize:15,fontWeight:600,color:"#0077B6"}}>First Brand</div><div style={{fontSize:9,color:"#F58634",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>Pharmacy</div></div>
    </div>
    <div style={{flex:1,padding:10,display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
      <div style={{fontSize:10,color:"#9AABB8",textTransform:"uppercase",letterSpacing:1.5,padding:"10px 10px 4px",fontWeight:600}}>Menu</div>
      {nav.filter(n=>n.show).map(n=><div key={n.id} onClick={()=>{setPage(n.id);setMobMenu(false);}} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:500,color:page===n.id?"#fff":"#6B7D8E",background:page===n.id?"linear-gradient(135deg,#00B4D8,#0077B6)":"transparent",display:"flex",alignItems:"center",gap:8}}>
        {n.l}{n.badge>0&&<span style={{marginLeft:"auto",minWidth:16,height:16,borderRadius:8,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",background:page===n.id?"rgba(255,255,255,.3)":"#EF4444",color:"#fff"}}>{n.badge}</span>}
      </div>)}
      <div style={{flex:1}}/>
      {r==="admin"&&<div onClick={resetData} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:12,color:"#9AABB8"}}>Reset Demo Data</div>}
      <div onClick={()=>{setLoggedIn(false);setMobMenu(false);}} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"#EF4444"}}>Sign Out</div>
    </div>
    <div style={{padding:"8px 10px",borderTop:"1px solid #E4EBF0"}}>
      <div style={{fontSize:9,color:"#9AABB8",marginBottom:3,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Demo</div>
      <select value={user.id} onChange={e=>{const u=emps.find(x=>x.id===e.target.value);setUser(u);setPage(defPage(u.role));setMobMenu(false);}} style={{...IS,fontSize:11,padding:"5px 8px"}}>{emps.map(e=><option key={e.id} value={e.id}>{e.name} ({e.role})</option>)}</select>
    </div>
    <div style={{padding:14,borderTop:"1px solid #E4EBF0",display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:32,height:32,borderRadius:8,background:r==="accountant"?"linear-gradient(135deg,#F58634,#D46A1A)":"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff"}}>{user.name[0]}</div>
      <div><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><RP role={r}/></div>
    </div>
  </>;

  const mainContent=<>
    {page==="dashboard"&&r==="pharmacist"&&<PharmDash user={user} entries={entries} bt={bt} et={et} branches={branches}/>}
    {page==="dashboard"&&(r==="admin"||r==="manager")&&<Dashboard user={user} emps={emps} entries={entries} bt={bt} et={et} branches={branches}/>}
    {page==="entry"&&<EntryPage user={user} emps={emps} entries={entries} setEntries={setEntries} branches={branches} bt={bt} et={et}/>}
    {page==="mylog"&&<AcctLog user={user} entries={entries} emps={emps} branches={branches}/>}
    {page==="emps"&&<EmpsPage emps={emps} setEmps={setEmps} branches={branches}/>}
    {page==="tasks"&&<TasksPage user={user} emps={emps} tasks={tasks} setTasks={setTasks}/>}
    {page==="msgs"&&<MsgsPage user={user} emps={emps} anns={anns} setAnns={setAnns} dms={dms} setDms={setDms}/>}
    {page==="files"&&<FilesPage user={user} branches={branches} files={files} setFiles={setFiles} folders={folders} setFolders={setFolders}/>}
    {page==="settings"&&<SettingsPage emps={emps} branches={branches} setBranches={setBranches} bt={bt} setBt={setBt} et={et} setEt={setEt} ap={ap} setAp={setAp} kpis={kpis} setKpis={setKpis}/>}
  </>;

  return<div style={{display:"flex",minHeight:"100vh"}}>
    {/* Mobile header */}
    <div className="mobile-header" style={{display:"none",position:"fixed",top:0,left:0,right:0,height:56,background:"#fff",borderBottom:"1px solid #E4EBF0",zIndex:90,alignItems:"center",padding:"0 16px",gap:12}}>
      <div onClick={()=>setMobMenu(!mobMenu)} style={{width:36,height:36,borderRadius:8,background:"#F7F9FC",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18}}>☰</div>
      <div style={{fontSize:15,fontWeight:600,color:"#0077B6",flex:1}}>First Brand</div>
      <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#00B4D8,#0077B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{user.name[0]}</div>
    </div>

    {/* Mobile overlay + sidebar */}
    {mobMenu&&<div className="mobile-overlay" onClick={()=>setMobMenu(false)} style={{display:"none",position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:95}}/>}
    {mobMenu&&<div className="sidebar-mobile" style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#fff",zIndex:100,display:"flex",flexDirection:"column",boxShadow:"4px 0 20px rgba(0,0,0,.1)"}}>
      {sidebarContent}
    </div>}

    {/* Desktop sidebar */}
    <div className="sidebar-desktop" style={{width:240,minWidth:240,background:"#fff",borderRight:"1px solid #E4EBF0",display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh"}}>
      {sidebarContent}
    </div>

    {/* Main content */}
    <div className="main-content" style={{flex:1,padding:"24px 28px",overflowY:"auto",marginTop:0}}>
      <div className="mobile-header" style={{display:"none",height:56}}/>
      {mainContent}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
